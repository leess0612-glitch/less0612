<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일할계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 460px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 11px 36px 11px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 8px;
      font-size: 15px;
      font-family: 'Malgun Gothic', sans-serif;
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbfc;
      text-align: right;
    }

    .input-wrap input:focus {
      border-color: #4f6ef7;
      background: #fff;
    }

    .input-unit {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: #aaa;
      pointer-events: none;
    }

    .info-box {
      background: #f6f8ff;
      border: 1.5px solid #d3dbff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .info-box strong {
      color: #4f6ef7;
    }

    .btn-calc {
      width: 100%;
      padding: 14px;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Malgun Gothic', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-calc:hover { background: #3a56d4; }
    .btn-calc:active { transform: scale(0.98); }

    .result-box {
      display: none;
      margin-top: 28px;
      background: #f6f8ff;
      border: 1.5px solid #d3dbff;
      border-radius: 12px;
      padding: 24px 22px;
    }

    .result-title {
      font-size: 12px;
      font-weight: 700;
      color: #4f6ef7;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #e4e8f7;
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 13px;
      color: #666;
    }

    .result-value {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a2e;
    }

    .result-value.highlight {
      font-size: 20px;
      color: #4f6ef7;
    }

    .result-meta {
      font-size: 12px;
      color: #999;
      margin-top: 14px;
      line-height: 1.8;
    }

    .error-msg {
      color: #e53e3e;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    .badge {
      display: inline-block;
      background: #eef0ff;
      color: #4f6ef7;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>일할계산기</h1>
    <p class="subtitle">입점비 일할 계산 · 부가세 포함/미포함</p>

    <div class="info-box" id="infoBox">
      <!-- 오늘 날짜 정보 JS로 채움 -->
    </div>

    <div class="form-group">
      <label>월 기준 금액 (부가세 미포함, 만원 단위)</label>
      <div class="input-wrap">
        <input type="text" id="monthlyFee" placeholder="17" inputmode="numeric">
        <span class="input-unit">만원</span>
      </div>
    </div>

    <button class="btn-calc" onclick="calculate()">계산하기</button>
    <div class="error-msg" id="errorMsg"></div>

    <div class="result-box" id="resultBox">
      <div class="result-title">계산 결과</div>

      <div class="result-row">
        <span class="result-label">이번 달 총 일수</span>
        <span class="result-value" id="rTotalDays">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">적용 일수 (오늘 ~ 말일)</span>
        <span class="result-value" id="rAppliedDays">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">일할 금액 <span class="badge">VAT 미포함</span></span>
        <span class="result-value highlight" id="rExVat">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">일할 금액 <span class="badge">VAT 포함</span></span>
        <span class="result-value highlight" id="rIncVat">—</span>
      </div>

      <div class="result-meta" id="rMeta"></div>
    </div>
  </div>

  <script>
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth() + 1; // 1-based
    const day = today.getDate();
    const totalDays = new Date(year, month, 0).getDate();
    const lastDay = totalDays;

    // 안내 박스 채우기
    document.getElementById('infoBox').innerHTML =
      `오늘: <strong>${year}년 ${month}월 ${day}일</strong>&nbsp;&nbsp;|&nbsp;&nbsp;` +
      `이번 달: <strong>${totalDays}일</strong><br>` +
      `계산 기간: <strong>${month}월 ${day}일 ~ ${month}월 ${lastDay}일</strong> (${totalDays - day + 1}일)`;

    // 금액 입력 시 자동 콤마
    const feeInput = document.getElementById('monthlyFee');
    feeInput.addEventListener('input', () => {
      const raw = feeInput.value.replace(/[^0-9]/g, '');
      feeInput.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
    });

    function roundTo100(n) {
      return Math.round(n / 100) * 100;
    }

    function fmt(n) {
      return n.toLocaleString('ko-KR') + '원';
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';
    }

    function calculate() {
      document.getElementById('errorMsg').style.display = 'none';

      const raw = feeInput.value.replace(/[^0-9]/g, '');
      const fee = parseInt(raw, 10);

      if (!fee || fee <= 0) return showError('월 기준 금액을 입력해주세요.');

      // 오늘부터 말일까지 (오늘 포함)
      const appliedDays = totalDays - day + 1;

      const rawAmount = (fee / totalDays) * appliedDays;
      const exVat = roundTo100(rawAmount);
      const incVat = roundTo100(exVat * 1.1);

      document.getElementById('rTotalDays').textContent = `${totalDays}일`;
      document.getElementById('rAppliedDays').textContent = `${appliedDays}일`;
      document.getElementById('rExVat').textContent = fmt(exVat);
      document.getElementById('rIncVat').textContent = fmt(incVat);

      const dailyRate = fee / totalDays;
      document.getElementById('rMeta').innerHTML =
        `일 단가: ${(dailyRate).toLocaleString('ko-KR', {maximumFractionDigits: 1})}원 (${fmt(fee)} ÷ ${totalDays}일)<br>` +
        `부가세(10%): ${fmt(incVat - exVat)}<br>` +
        `100원 단위 반올림 적용`;

      document.getElementById('resultBox').style.display = 'block';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') calculate();
    });
  </script>
</body>
</html>
