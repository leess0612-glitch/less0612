<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일할계산기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Malgun Gothic', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 24px;
    }

    .info-box {
      background: #f6f8ff;
      border: 1.5px solid #d3dbff;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .info-box strong { color: #4f6ef7; }

    /* 지역 선택 버튼 */
    .region-label {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 10px;
    }

    .region-btns {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn-region {
      flex: 1;
      padding: 12px 6px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      background: #fafbfc;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Malgun Gothic', sans-serif;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
      line-height: 1.4;
    }

    .btn-region:hover { border-color: #4f6ef7; color: #4f6ef7; background: #f0f3ff; }

    .btn-region.active {
      border-color: #4f6ef7;
      background: #4f6ef7;
      color: #fff;
    }

    /* 결과 전체 영역 */
    .results-wrap {
      display: none;
    }

    .period-info {
      font-size: 12px;
      color: #999;
      margin-bottom: 16px;
      text-align: center;
    }

    /* 카페 카드 */
    .cafe-card {
      background: #f6f8ff;
      border: 1.5px solid #d3dbff;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .cafe-card:last-child { margin-bottom: 0; }

    .cafe-name {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 4px;
    }

    .cafe-base {
      font-size: 12px;
      color: #999;
      margin-bottom: 14px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #e4e8f7;
    }

    .result-row:last-of-type { border-bottom: none; }

    .result-label {
      font-size: 13px;
      color: #666;
    }

    .result-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-value {
      font-size: 17px;
      font-weight: 700;
      color: #4f6ef7;
    }

    .badge {
      display: inline-block;
      background: #eef0ff;
      color: #4f6ef7;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .btn-copy {
      padding: 4px 10px;
      background: #eef0ff;
      color: #4f6ef7;
      border: 1.5px solid #d3dbff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Malgun Gothic', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .btn-copy:hover { background: #d3dbff; }
    .btn-copy.copied { background: #d4f7e0; color: #2a7a4f; border-color: #a8e6c3; }

    .calc-note {
      font-size: 11px;
      color: #bbb;
      margin-top: 20px;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>일할계산기</h1>
    <p class="subtitle">입점비 일할 계산 · 부가세 포함/미포함</p>

    <div class="info-box" id="infoBox"></div>

    <div class="region-label">지역 선택</div>
    <div class="region-btns">
      <button class="btn-region" onclick="selectRegion('seoul')">서울</button>
      <button class="btn-region" onclick="selectRegion('gyeonggi')">경기·광역시</button>
      <button class="btn-region" onclick="selectRegion('other')">기타지방</button>
    </div>

    <div class="results-wrap" id="resultsWrap">
      <div class="period-info" id="periodInfo"></div>

      <!-- 성지똑똑 -->
      <div class="cafe-card">
        <div class="cafe-name">성지똑똑</div>
        <div class="cafe-base" id="base-sj"></div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 미포함</span></span>
          <span class="result-right">
            <span class="result-value" id="sj-ex">—</span>
            <button class="btn-copy" id="copy-sj-ex" onclick="copyVal('sj-ex', 'copy-sj-ex')">복사</button>
          </span>
        </div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 포함</span></span>
          <span class="result-right">
            <span class="result-value" id="sj-inc">—</span>
            <button class="btn-copy" id="copy-sj-inc" onclick="copyVal('sj-inc', 'copy-sj-inc')">복사</button>
          </span>
        </div>
      </div>

      <!-- 좌표동맹 -->
      <div class="cafe-card">
        <div class="cafe-name">좌표동맹</div>
        <div class="cafe-base" id="base-jw"></div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 미포함</span></span>
          <span class="result-right">
            <span class="result-value" id="jw-ex">—</span>
            <button class="btn-copy" id="copy-jw-ex" onclick="copyVal('jw-ex', 'copy-jw-ex')">복사</button>
          </span>
        </div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 포함</span></span>
          <span class="result-right">
            <span class="result-value" id="jw-inc">—</span>
            <button class="btn-copy" id="copy-jw-inc" onclick="copyVal('jw-inc', 'copy-jw-inc')">복사</button>
          </span>
        </div>
      </div>

      <!-- 컴백폰 -->
      <div class="cafe-card">
        <div class="cafe-name">컴백폰</div>
        <div class="cafe-base" id="base-cb"></div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 미포함</span></span>
          <span class="result-right">
            <span class="result-value" id="cb-ex">—</span>
            <button class="btn-copy" id="copy-cb-ex" onclick="copyVal('cb-ex', 'copy-cb-ex')">복사</button>
          </span>
        </div>
        <div class="result-row">
          <span class="result-label">일할 금액 <span class="badge">VAT 포함</span></span>
          <span class="result-right">
            <span class="result-value" id="cb-inc">—</span>
            <button class="btn-copy" id="copy-cb-inc" onclick="copyVal('cb-inc', 'copy-cb-inc')">복사</button>
          </span>
        </div>
      </div>

      <div class="calc-note" id="calcNote"></div>
    </div>
  </div>

  <script>
    const today = new Date();
    const year = today.getFullYear();
    const month = today.getMonth() + 1;
    const day = today.getDate();
    const totalDays = new Date(year, month, 0).getDate();
    const appliedDays = totalDays - day + 1;

    document.getElementById('infoBox').innerHTML =
      `오늘: <strong>${year}년 ${month}월 ${day}일</strong>&nbsp;&nbsp;|&nbsp;&nbsp;` +
      `이번 달: <strong>${totalDays}일</strong><br>` +
      `계산 기간: <strong>${month}월 ${day}일 ~ ${month}월 ${totalDays}일</strong> (${appliedDays}일)`;

    // 카페별 지역별 월 기준 금액 (만원)
    const FEES = {
      sj: { seoul: 30, gyeonggi: 25, other: 17 },  // 성지똑똑
      jw: { seoul: 10, gyeonggi: 7,  other: 5  },  // 좌표동맹
      cb: { seoul: 8,  gyeonggi: 5,  other: 3  },  // 컴백폰
    };

    const REGION_LABEL = { seoul: '서울', gyeonggi: '경기·광역시', other: '기타지방' };

    function roundTo1000(n) {
      return Math.round(n / 1000) * 1000;
    }

    function fmt(n) {
      return n.toLocaleString('ko-KR') + '원';
    }

    function calcDaily(feeMan) {
      const fee = feeMan * 10000;
      const exVat = roundTo1000((fee / totalDays) * appliedDays);
      const incVat = Math.round(exVat * 1.1);
      return { exVat, incVat, fee };
    }

    function selectRegion(region) {
      // 버튼 활성화
      document.querySelectorAll('.btn-region').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      const label = REGION_LABEL[region];

      // 각 카페 계산 및 표시
      const cafes = [
        { key: 'sj', exId: 'sj-ex', incId: 'sj-inc', baseId: 'base-sj' },
        { key: 'jw', exId: 'jw-ex', incId: 'jw-inc', baseId: 'base-jw' },
        { key: 'cb', exId: 'cb-ex', incId: 'cb-inc', baseId: 'base-cb' },
      ];

      cafes.forEach(({ key, exId, incId, baseId }) => {
        const feeMan = FEES[key][region];
        const { exVat, incVat, fee } = calcDaily(feeMan);
        document.getElementById(exId).textContent = fmt(exVat);
        document.getElementById(incId).textContent = fmt(incVat);
        document.getElementById(baseId).textContent = `월 기준 ${feeMan}만원 (${fmt(fee)}) · 부가세 미포함`;
      });

      document.getElementById('periodInfo').textContent =
        `${label} · ${month}월 ${day}일 ~ ${totalDays}일 (${appliedDays}일 / 총 ${totalDays}일)`;

      document.getElementById('calcNote').innerHTML =
        `VAT 미포함 기준 1,000원 단위 반올림 적용 (100의 자리에서 반올림)`;

      document.getElementById('resultsWrap').style.display = 'block';
    }

    function copyVal(valId, btnId) {
      const text = document.getElementById(valId).textContent.replace('원', '').trim();
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById(btnId);
        btn.textContent = '복사됨';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
      });
    }
  </script>
</body>
</html>
