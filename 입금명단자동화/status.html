<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="60">
<title>입금명단 자동화 - 실행 현황</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', -apple-system, sans-serif; background: #f0f2f5; padding: 24px; color: #222; }
  h1 { font-size: 20px; margin-bottom: 20px; color: #1a1a2e; }
  .cards { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
  .card { background: white; border-radius: 10px; padding: 18px 24px; min-width: 160px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .card .val { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
  .card .lbl { font-size: 12px; color: #888; }
  .green { color: #1e8e3e; }
  .red { color: #d93025; }
  .orange { color: #e37400; }
  .blue { color: #1a73e8; }
  table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  th { background: #1a73e8; color: white; padding: 11px 14px; text-align: left; font-size: 13px; font-weight: 600; }
  td { padding: 9px 14px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8f9ff; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
  .badge-ok { background: #e6f4ea; color: #1e8e3e; }
  .badge-fail { background: #fce8e6; color: #d93025; }
  .badge-skip { background: #fff3e0; color: #e37400; }
  .empty { text-align: center; padding: 40px; color: #aaa; font-size: 14px; line-height: 2; }
  .footer { margin-top: 12px; font-size: 11px; color: #aaa; text-align: right; }
</style>
</head>
<body>
<h1>입금명단 자동화 — 실행 현황</h1>
<div id="root"></div>
<div class="footer">※ 이 페이지는 프로그램 실행 시 자동 갱신됩니다 (브라우저 1분 자동새로고침)</div>
<script>
const LOGS = [];

function render() {
  const el = document.getElementById('root');
  if (!LOGS.length) {
    el.innerHTML = "<div class='empty'>아직 실행 기록이 없습니다.<br>오늘 20:00 스케줄러 실행 후 이 페이지가 자동 갱신됩니다.</div>";
    return;
  }

  const lastAny = LOGS[LOGS.length - 1];
  const last = [...LOGS].reverse().find(e => !e.skipped) || lastAny;

  const statusColor = lastAny.skipped ? 'orange' : (lastAny.cafe_posted ? 'green' : 'red');
  const statusText = lastAny.skipped || (lastAny.cafe_posted ? '게시 완료' : '게시 실패');

  let cards = "<div class='cards'>";
  cards += "<div class='card'><div class='val blue'>" + lastAny.run_at + "</div><div class='lbl'>마지막 실행 시각</div></div>";
  cards += "<div class='card'><div class='val " + statusColor + "'>" + statusText + "</div><div class='lbl'>마지막 결과</div></div>";
  cards += "<div class='card'><div class='val blue'>" + (last ? (last.total_rows || 0) : 0) + "</div><div class='lbl'>최근 게시 건수</div></div>";
  cards += "<div class='card'><div class='val blue'>" + LOGS.length + "</div><div class='lbl'>총 실행 횟수 (최근 60회)</div></div>";
  cards += "</div>";

  let rows = "";
  for (const e of [...LOGS].reverse()) {
    let badge;
    if (e.skipped) badge = "<span class='badge badge-skip'>" + e.skipped + "</span>";
    else if (e.cafe_posted) badge = "<span class='badge badge-ok'>완료</span>";
    else badge = "<span class='badge badge-fail'>실패</span>";

    rows += "<tr>";
    rows += "<td>" + e.run_at + "</td>";
    rows += "<td>" + (e.date_filter || '-') + "</td>";
    rows += "<td>" + (e.wired_count != null ? e.wired_count : '-') + "</td>";
    rows += "<td>" + (e.rental_count != null ? e.rental_count : '-') + "</td>";
    rows += "<td>" + (e.backup_count != null ? e.backup_count : '-') + "</td>";
    rows += "<td><b>" + (e.total_rows != null ? e.total_rows : '-') + "</b></td>";
    rows += "<td>" + badge + "</td>";
    rows += "<td style='color:#999;font-size:12px'>" + (e.error || '') + "</td>";
    rows += "</tr>";
  }

  let table = "<table>";
  table += "<tr><th>실행 시각</th><th>날짜</th><th>유선</th><th>렌탈</th><th>백업</th><th>합계</th><th>결과</th><th>오류</th></tr>";
  table += rows;
  table += "</table>";

  el.innerHTML = cards + table;
}
render();
</script>
</body>
</html>
