<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>렌탈 수수료 조회 시스템</title>
<style>
  :root {
    --brand: #0066cc;
    --brand-light: #e8f0fd;
    --accent: #e05500;
    --green: #1a8a3c;
    --gray-50: #f8f9fa;
    --gray-100: #f0f2f5;
    --gray-200: #e4e7ec;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
    font-size: 13px;
    background: var(--gray-100);
    color: var(--gray-800);
  }

  /* ── 헤더 ── */
  header {
    background: var(--brand);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  header .meta { font-size: 11px; opacity: .8; }
  header .brand-tabs { display: flex; gap: 4px; margin-left: auto; }
  .brand-tab {
    padding: 4px 12px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,.15); color: #fff; font-size: 12px;
    border: 1px solid rgba(255,255,255,.3);
  }
  .brand-tab.active { background: #fff; color: var(--brand); font-weight: 700; }

  /* ── 레이아웃 ── */
  .layout { display: flex; height: calc(100vh - 44px); overflow: hidden; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 220px; min-width: 220px;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 12px;
    font-size: 11px; font-weight: 700; color: var(--gray-600);
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .cat-list { display: flex; flex-direction: column; }
  .cat-btn {
    padding: 9px 14px;
    text-align: left; cursor: pointer;
    border: none; background: none;
    font-size: 13px; color: var(--gray-700);
    border-bottom: 1px solid var(--gray-100);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cat-btn:hover { background: var(--brand-light); }
  .cat-btn.active { background: var(--brand-light); color: var(--brand); font-weight: 700; }
  .cat-btn .count {
    font-size: 10px; background: var(--gray-200); color: var(--gray-600);
    padding: 1px 6px; border-radius: 10px;
  }
  .cat-btn.active .count { background: var(--brand); color: #fff; }

  .prod-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--gray-200);
  }
  .prod-search input {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 12px; outline: none;
  }
  .prod-search input:focus { border-color: var(--brand); }

  .prod-list { overflow-y: auto; flex: 1; }
  .prod-item {
    padding: 8px 14px; cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
    font-size: 12px; line-height: 1.4;
  }
  .prod-item:hover { background: var(--brand-light); }
  .prod-item.active { background: var(--brand); color: #fff; }
  .prod-item .model { font-size: 10px; opacity: .7; margin-top: 1px; }
  .prod-item.active .model { opacity: .85; }

  /* ── 메인 영역 ── */
  .main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── 카드 ── */
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 10px 16px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header h2 { font-size: 14px; font-weight: 700; }
  .card-body { padding: 14px 16px; }

  /* ── 제품 정보 카드 ── */
  .product-info {
    display: flex; align-items: flex-start; gap: 16px;
  }
  .product-info .model-badge {
    background: var(--brand); color: #fff;
    padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .product-info .name { font-size: 18px; font-weight: 700; }
  .product-info .note {
    margin-top: 4px; font-size: 11px; color: var(--accent);
    background: #fff5f0; padding: 3px 8px; border-radius: 4px; display: inline-block;
  }
  .product-info .promo-toggle {
    margin-top: 6px; font-size: 11px; color: var(--brand); cursor: pointer;
    text-decoration: underline;
  }
  .promo-text {
    margin-top: 6px; font-size: 11px; color: var(--gray-600);
    white-space: pre-wrap; background: var(--gray-50);
    padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--brand-light);
    display: none;
  }
  .promo-text.open { display: block; }
  .detail-btn {
    margin-left: auto; padding: 6px 14px;
    background: none; border: 1px solid var(--brand); color: var(--brand);
    border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .detail-btn:hover { background: var(--brand); color: #fff; }

  /* ── 목표 마진 (헤더 내) ── */
  .margin-setting-inline {
    display: flex; align-items: center; gap: 6px; margin-left: auto;
  }
  .margin-setting-inline label { font-size: 11px; font-weight: 700; color: var(--gray-600); white-space: nowrap; }
  .margin-input-field {
    width: 90px; padding: 4px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 12px; text-align: right; outline: none; font-family: inherit;
    background: #fff;
  }
  .margin-input-field:focus { border-color: var(--brand); }

  /* ── 옵션 나열 테이블 ── */
  .options-scroll-wrap {
    max-height: 340px;
    overflow-y: auto;
    border-top: 1px solid var(--gray-200);
  }
  .options-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  .options-table thead th {
    position: sticky; top: 0; z-index: 1;
    background: var(--gray-50); padding: 8px 10px;
    text-align: center; font-weight: 600; font-size: 11px;
    color: var(--gray-600); border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
  }
  .options-table thead th:nth-child(2),
  .options-table thead th:nth-child(3) { text-align: left; }
  .options-table tbody tr {
    border-bottom: 1px solid var(--gray-100);
    cursor: pointer; transition: background .1s;
  }
  .options-table tbody tr:hover { background: #f0f7ff; }
  .options-table tbody tr.row-selected { background: #eff6ff; }
  .options-table tbody tr.row-selected:hover { background: #dbeafe; }
  .options-table tbody td {
    padding: 7px 10px; vertical-align: middle;
    text-align: center;
  }
  .options-table tbody td:nth-child(2),
  .options-table tbody td:nth-child(3) { text-align: left; }

  /* 선택/해제 버튼 */
  .select-btn {
    padding: 3px 10px;
    border-radius: 5px;
    border: 1px solid var(--gray-300, #d1d5db);
    background: #fff;
    color: var(--gray-600);
    font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
    transition: background .15s, color .15s, border-color .15s;
    font-family: inherit;
  }
  .select-btn:hover { border-color: var(--brand); color: var(--brand); }
  .select-btn.selected {
    background: var(--brand);
    color: #fff;
    border-color: var(--brand);
  }

  .contract-cell { font-weight: 700; color: var(--brand); }
  .fee-cell { font-weight: 700; font-size: 13px; }
  .total-comm { font-weight: 700; color: var(--green); }
  .mgmt-badge {
    display: inline-block; padding: 2px 7px;
    border-radius: 4px; font-size: 10px; font-weight: 700;
  }
  .mgmt-방문 { background: #dbeafe; color: #1d4ed8; }
  .mgmt-셀프 { background: #dcfce7; color: #166534; }
  .mgmt-무방문형 { background: #fef9c3; color: #854d0e; }
  .mgmt-none { background: var(--gray-100); color: var(--gray-600); }
  .mgmt-할인 { background: #fee2e2; color: #b91c1c; }
  .mgmt-할인타사 { background: #fce7f3; color: #9d174d; }

  .gift-input {
    width: 80px; padding: 4px 6px;
    border: 1px solid var(--gray-200); border-radius: 5px;
    font-size: 12px; text-align: right; outline: none;
    color: var(--accent); font-weight: 700; font-family: inherit;
  }
  .gift-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(224,85,0,.1); }
  .cost-note-cell { font-size: 10px; color: var(--gray-400); margin-top: 2px; }

  .margin-cell { font-weight: 700; }
  .margin-pos { color: var(--green); }
  .margin-neg { color: #dc2626; }

  /* ── 안내문 카드 강조 ── */
  .notice-card {
    border: 2px solid var(--brand);
    box-shadow: 0 4px 16px rgba(0,102,204,.15);
  }
  .notice-header {
    background: var(--brand) !important;
    border-bottom: none !important;
    padding: 12px 16px !important;
  }
  .notice-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
  .copy-all-btn {
    margin-left: auto;
    padding: 6px 16px;
    background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.5); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 700;
    transition: background .15s;
  }
  .copy-all-btn:hover { background: rgba(255,255,255,.35); }
  .copy-all-btn:active { transform: scale(.98); }
  .copy-textarea {
    width: 100%;
    min-height: 280px;
    padding: 14px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 14px; line-height: 1.8;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    resize: vertical;
    background: #fff;
    color: var(--gray-800);
    outline: none;
  }
  .copy-textarea:focus { border-color: var(--brand); }

  /* ── 관리방법 그룹 음영 ── */
  .options-table tbody tr.mgmt-group-shade { background: #f3f4f6; }
  .options-table tbody tr.mgmt-group-shade.package-row { background: #f0ebfa; }
  .options-table tbody tr:hover { background: #e8f0fe !important; }
  .options-table tbody tr.row-selected,
  .options-table tbody tr.row-selected.mgmt-group-shade { background: #eff6ff !important; }
  .options-table tbody tr.row-selected:hover { background: #dbeafe !important; }

  /* ── 접수처 배지 ── */
  .office-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; white-space: nowrap; }
  .office-에이컴즈 { background: #dbeafe; color: #1d4ed8; }
  .office-티엘    { background: #dcfce7; color: #166534; }
  .office-동일    { background: var(--gray-100); color: var(--gray-600); }
  .office-none    { color: var(--gray-400); font-size: 11px; }

  /* ── 패키지 행 ── */
  .options-table tbody tr.package-row { background: #faf5ff; }
  .options-table tbody tr.package-row:hover { background: #f3e8ff; }
  .options-table tbody tr.package-row.row-selected { background: #ede9fe; }
  .mgmt-패키지 { background: #ede9fe; color: #6d28d9; }
  .pkg-sep td {
    border-top: 2px dashed var(--gray-200) !important;
    padding: 6px 10px 4px !important;
    font-size: 10px; color: var(--gray-400); font-weight: 600;
    letter-spacing: .3px;
  }
  .pkg-note {
    display: inline-block;
    margin-left: 12px;
    font-size: 11px; font-weight: 600;
    color: #92400e;
    background: #fef3c7;
    border: 1px solid #fcd34d;
    border-radius: 4px;
    padding: 1px 8px;
    letter-spacing: 0;
  }

  /* ── 경고 팝업 ── */
  #warn-popup {
    display: none;
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.45); z-index: 1000;
    align-items: center; justify-content: center;
  }
  #warn-popup.show { display: flex; }
  .warn-box {
    background: #fff; border-radius: 10px;
    padding: 28px 32px; max-width: 400px; width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,.25);
    text-align: center;
  }
  .warn-box .warn-icon { font-size: 36px; margin-bottom: 12px; }
  .warn-box .warn-title { font-size: 15px; font-weight: 700; color: #b45309; margin-bottom: 8px; }
  .warn-box .warn-msg { font-size: 13px; color: var(--gray-600); line-height: 1.6; margin-bottom: 20px; }
  .warn-box button {
    padding: 8px 28px; background: var(--brand); color: #fff;
    border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700;
    font-family: inherit;
  }
  .warn-box button:hover { background: #0055b3; }
  .warn-row-badge {
    display: inline-block; font-size: 11px; color: #b45309;
    background: #fef3c7; border: 1px solid #fcd34d;
    border-radius: 4px; padding: 1px 5px; margin-left: 4px;
    vertical-align: middle;
  }

  /* ── 빈 상태 ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 0; color: var(--gray-400);
    gap: 8px;
  }
  .empty-state .icon { font-size: 36px; }
  .empty-state p { font-size: 13px; }

  /* ── 토스트 ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }

  @media (max-width: 900px) {
    .sidebar { width: 180px; min-width: 180px; }
  }

  /* ── 헤더 검색 ── */
  .header-search-wrap {
    position: relative;
    flex: 1; max-width: 380px; min-width: 160px;
    margin: 0 12px;
  }
  .header-search-input {
    width: 100%; padding: 7px 16px;
    border: none; border-radius: 20px;
    font-size: 13px; outline: none;
    background: rgba(255,255,255,.18);
    color: #fff; font-family: inherit;
    transition: background .2s;
  }
  .header-search-input::placeholder { color: rgba(255,255,255,.65); }
  .header-search-input:focus {
    background: rgba(255,255,255,.95);
    color: var(--gray-800);
    box-shadow: 0 0 0 3px rgba(255,255,255,.3);
  }
  .header-search-input:focus::placeholder { color: var(--gray-400); }
  .header-search-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: #fff; border-radius: 10px;
    box-shadow: 0 6px 24px rgba(0,0,0,.22);
    max-height: 300px; overflow-y: auto;
    display: none; z-index: 200;
  }
  .header-search-dropdown.open { display: block; }
  .hsd-item {
    padding: 9px 14px; cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
    line-height: 1.35;
  }
  .hsd-item:last-child { border-bottom: none; }
  .hsd-item:hover { background: var(--brand-light); }
  .hsd-brand { font-size: 10px; color: var(--brand); font-weight: 700; margin-bottom: 1px; }
  .hsd-name  { font-size: 12px; color: var(--gray-800); }
  .hsd-model { font-size: 10px; color: var(--gray-400); margin-top: 1px; }

  /* ── 빠른 바로가기 ── */
  .quick-access {
    padding: 28px 28px 32px;
  }
  .qa-intro {
    font-size: 12px; color: var(--gray-400); margin-bottom: 20px; text-align: center;
  }
  .qa-brand-section { margin-bottom: 28px; }
  .qa-brand-title {
    font-size: 13px; font-weight: 700; color: var(--brand);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .qa-brand-title::before { content: ''; flex: 0 0 3px; height: 14px; background: var(--brand); border-radius: 2px; }
  .qa-brand-title::after  { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
  .qa-primary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 8px; }
  .qa-secondary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .qa-section-header {
    font-size: 10px; font-weight: 700; color: var(--gray-400);
    letter-spacing: .5px; margin: 12px 0 8px; text-transform: uppercase;
  }
  .qa-type-label {
    font-size: 11px; font-weight: 700; color: var(--gray-500, #6b7280);
    padding: 5px 0 6px; margin-bottom: 8px;
    border-bottom: 2px solid var(--gray-200);
    text-align: center; letter-spacing: .3px;
  }
  .qa-type-label.primary {
    color: var(--brand);
    border-bottom-color: var(--brand);
    font-size: 12px;
  }
  .qa-prod-btn {
    display: block; width: 100%;
    padding: 9px 11px; margin-bottom: 7px;
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: 7px; cursor: pointer;
    font-size: 12px; text-align: left; color: var(--gray-800);
    line-height: 1.4; font-family: inherit;
    transition: border-color .15s, background .15s, color .15s;
  }
  .qa-prod-btn:hover { border-color: var(--brand); background: var(--brand-light); color: var(--brand); }
  .qa-prod-btn.primary-prod { background: #f0f6ff; border-color: #93c5fd; }
  .qa-prod-btn.primary-prod:hover { background: var(--brand); color: #fff; border-color: var(--brand); }
  .qa-prod-btn .qa-model { font-size: 10px; color: var(--gray-400); margin-top: 2px; }
  .qa-prod-btn:hover .qa-model { color: inherit; opacity: .7; }
  .qa-empty { font-size: 11px; color: var(--gray-400); text-align: center; padding: 12px 0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏠 렌탈 수수료 조회 시스템</h1>
    <div class="meta" id="meta-info">데이터 로딩 중...</div>
  </div>
  <div class="header-search-wrap">
    <input type="text" id="header-search" class="header-search-input"
      placeholder="🔍 전체 제품 검색 (모델명·제품명)..."
      oninput="headerSearchInput()"
      onblur="hideHeaderDropdown()"
      autocomplete="off">
    <div class="header-search-dropdown" id="header-search-dropdown"></div>
  </div>
  <div class="brand-tabs">
    <div class="brand-tab active" onclick="switchBrand('sk')">SK매직</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">LG전자</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">코웨이</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">쿠쿠</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">청호</div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-header">카테고리</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="prod-search">
      <input type="text" id="prod-search" placeholder="제품 검색..." oninput="filterProducts()">
    </div>
    <div class="sidebar-header">제품 목록</div>
    <div class="prod-list" id="prod-list"></div>
  </div>

  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>좌측에서 제품을 선택하세요</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- 요금 경고 팝업 -->
<div id="warn-popup">
  <div class="warn-box">
    <div class="warn-icon">⚠️</div>
    <div class="warn-title">요금 확인 필요</div>
    <div class="warn-msg">요금이 틀릴 가능성이 있으니<br>엑셀파일 확인 후 안내하세요.<br><small style="color:var(--gray-400)">(⚠️ 표시된 항목)</small></div>
    <button onclick="closeWarnPopup()">확인</button>
  </div>

const PKG_NOTES = {
  '정수기': '⚠️ 정수기 2대 패키지 불가 · 단, 기존 정수기 보유 고객의 신규 접수는 패키지 적용 가능',
  '비데':   '⚠️ 비데 신규 패키지는 2대까지만 가능',
};
const TL_WARNINGS = []; // 티엘 J≠K 경고 모델코드 목록

let state = {
  category: '전체',
  productId: null,
  selectedKeys: new Set(),
  targetMargin: 150000,
  giftOverrides: {},
  searchText: '',
};

// ── 초기화 ──
function init() {
  const meta = DB.metadata;
  document.getElementById('meta-info').textContent =
    `${meta.brand} ${meta.sheetTitle || ''} · 파싱: ${meta.parsedAt}`;
  renderCategoryList();
  renderProductList();
  renderMain(); // 빠른 바로가기 패널 초기 렌더
}

// ── 카테고리 ──
function getCategories() {
  const counts = { '전체': DB.products.length };
  DB.products.forEach(p => {
    counts[p.category] = (counts[p.category] || 0) + 1;
  });
  return counts;
}

function renderCategoryList() {
  const el = document.getElementById('cat-list');
  const cats = getCategories();
  const order = ['전체', '정수기', '공기청정기', '비데', '매트리스', '기타'];
  el.innerHTML = order.filter(c => cats[c]).map(c => `
    <button class="cat-btn ${state.category === c ? 'active' : ''}"
      onclick="selectCategory('${c}')">
      ${c} <span class="count">${cats[c]}</span>
    </button>
  `).join('');
}

function selectCategory(cat) {
  state.category = cat;
  state.productId = null;
  state.selectedKeys = new Set();
  state.searchText = '';
  document.getElementById('prod-search').value = '';
  renderCategoryList();
  renderProductList();
  renderMain();
}

// ── 제품 목록 ──
function getFilteredProducts() {
  return DB.products.filter(p => {
    const matchCat = state.category === '전체' || p.category === state.category;
    const matchSearch = !state.searchText ||
      p.name.includes(state.searchText) ||
      p.modelCode.toLowerCase().includes(state.searchText.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderProductList() {
  const el = document.getElementById('prod-list');
  const products = getFilteredProducts();
  if (!products.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">검색 결과 없음</div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="prod-item ${p.id === state.productId ? 'active' : ''}"
      onclick="selectProduct('${p.id}')">
      <div>${p.name}</div>
      <div class="model">${p.modelCode || ''}</div>
    </div>
  `).join('');
}

function filterProducts() {
  state.searchText = document.getElementById('prod-search').value.trim();
  renderProductList();
}

function selectProduct(id) {
  state.productId = id;
  state.selectedKeys = new Set();
  renderProductList();
  renderMain();
  // 에이컴즈 F≠G 또는 티엘 J≠K 경고 있으면 팝업
  const product = DB.products.find(p => p.id === id);
  if (product) {
    const skWarn = product.options.some(o => o.dataWarning);
    const modelNorm = (product.modelCode || '').replace(/\s+/g,'').toUpperCase();
    const tlWarn = TL_WARNINGS.some(w => w.replace(/\s+/g,'').toUpperCase() === modelNorm);
    if (skWarn || tlWarn) {
      showWarnPopup(skWarn, tlWarn);
    }
  }
}

function showWarnPopup(skWarn, tlWarn) {
  let sources = [];
  if (skWarn) sources.push('에이컴즈 (F열 ≠ G열)');
  if (tlWarn) sources.push('티엘 (J열 ≠ K열)');
  const msgEl = document.querySelector('#warn-popup .warn-msg');
  if (msgEl) {
    msgEl.innerHTML = `요금이 틀릴 가능성이 있으니<br>엑셀파일 확인 후 안내하세요.<br>
      <small style="color:#b45309;font-weight:600">${sources.join(' / ')}</small><br>
      <small style="color:var(--gray-400)">(⚠️ 표시된 항목)</small>`;
  }
  document.getElementById('warn-popup').classList.add('show');
}
function closeWarnPopup() {
  document.getElementById('warn-popup').classList.remove('show');
}

// ── 헤더 전체 검색 ──
function headerSearchInput() {
  const val = document.getElementById('header-search').value.trim();
  const dd = document.getElementById('header-search-dropdown');
  if (!val) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  // 현재 SK매직 DB 검색 (추후 브랜드 추가 시 allProducts에 합산)
  const allProducts = DB.products.map(p => ({ ...p, brandLabel: 'SK매직' }));

  const lower = val.toLowerCase();
  const results = allProducts.filter(p =>
    p.name.includes(val) ||
    (p.modelCode || '').toLowerCase().includes(lower)
  ).slice(0, 14);

  if (!results.length) {
    dd.innerHTML = '<div class="hsd-item" style="color:var(--gray-400);cursor:default">검색 결과 없음</div>';
    dd.classList.add('open');
    return;
  }

  dd.innerHTML = results.map(p => `
    <div class="hsd-item" onmousedown="selectProductFromHeader('${p.id}')">
      <div class="hsd-brand">[${p.brandLabel}] ${p.category}</div>
      <div class="hsd-name">${p.name}</div>
      <div class="hsd-model">${p.modelCode || ''}</div>
    </div>
  `).join('');
  dd.classList.add('open');
}

function hideHeaderDropdown() {
  setTimeout(() => {
    const dd = document.getElementById('header-search-dropdown');
    if (dd) { dd.classList.remove('open'); }
  }, 160);
}

function selectProductFromHeader(id) {
  document.getElementById('header-search').value = '';
  const dd = document.getElementById('header-search-dropdown');
  if (dd) { dd.classList.remove('open'); dd.innerHTML = ''; }
  state.category = '전체';
  state.searchText = '';
  document.getElementById('prod-search').value = '';
  renderCategoryList();
  renderProductList();
  selectProduct(id);
  setTimeout(() => {
    const active = document.querySelector('.prod-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }, 60);
}

// ── 빠른 바로가기 패널 ──
function renderQuickAccess() {
  const PRIMARY_GROUPS = [
    { type: '얼음정수기 ★',
      filter: p => p.category === '정수기' && p.name.includes('원코크') && p.name.includes('플러스') },
    { type: '냉온정수기 ★',
      filter: p => p.category === '정수기' && p.name.includes('초소형') && p.name.includes('플러스') },
  ];

  const SECONDARY_GROUPS = [
    { type: '정수전용', filter: null },
    { type: '스탠드',
      filter: p => p.category === '정수기' && p.name.includes('스탠드') },
    { type: '저수조 탁상형',
      filter: p => p.category === '정수기' && p.name.includes('뉴슬림') && p.name.includes('NANO') },
    { type: '고경수/석회/녹물 (RO)',
      filter: p => p.category === '정수기' && p.name.includes('RO') },
  ];

  function makeCol(g, primary) {
    const prods = g.filter ? DB.products.filter(g.filter) : [];
    const labelClass = primary ? 'qa-type-label primary' : 'qa-type-label';
    const btnHtml = prods.length
      ? prods.map(p => `
          <button class="qa-prod-btn ${primary ? 'primary-prod' : ''}"
            onclick="selectProduct('${p.id}')">
            ${p.name}
            <div class="qa-model">${p.modelCode || ''}</div>
          </button>
        `).join('')
      : `<div class="qa-empty">준비 중</div>`;
    return `<div class="qa-type-col"><div class="${labelClass}">${g.type}</div>${btnHtml}</div>`;
  }

  const primaryHtml   = PRIMARY_GROUPS.map(g => makeCol(g, true)).join('');
  const secondaryHtml = SECONDARY_GROUPS.map(g => makeCol(g, false)).join('');

  return `<div class="quick-access">
    <div class="qa-intro">자주 조회하는 제품을 바로 선택하거나, 위 검색창·좌측 목록에서 제품을 찾으세요.</div>
    <div class="qa-brand-section">
      <div class="qa-brand-title">SK매직 · 정수기 바로가기</div>
      <div class="qa-section-header">주요 판매 제품</div>
      <div class="qa-primary-grid">${primaryHtml}</div>
      <div class="qa-section-header">기타 제품</div>
      <div class="qa-secondary-grid">${secondaryHtml}</div>
    </div>
  </div>`;
}

function renderOptionList(product) {
  const opts = product.options;
  if (!opts.length) return '<div class="empty-state" style="padding:24px"><p>옵션 없음</p></div>';

  const hasMgmt = opts.some(o => o.managementType);
  const hasVisit = opts.some(o => o.visitCycle);
  const hasOffice = opts.some(o => o.recommendedOffice !== undefined);

  // 관리방법 그룹 번호 매핑 (순서대로 0, 1, 2... → 짝수=음영)
  const mgmtGroupMap = {};
  let groupCounter = 0;
  opts.forEach(o => {
    const mt = o.managementType || '';
    if (!(mt in mgmtGroupMap)) mgmtGroupMap[mt] = groupCounter++;
  });

  let rowsHtml = '';
  let pkgSepAdded = false;

  opts.forEach(o => {
    const key = getOptionKey(product.id, o);
    const safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');
    const isSelected = state.selectedKeys.has(key);
    const isPkg = !!o.isPackage;
    const gift = getGift(o);
    const realCost = Math.round(gift * 1.1);
    const margin = o.totalCommission - realCost;
    const marginClass = margin >= 0 ? 'margin-pos' : 'margin-neg';

    const mgmtBase = getMgmtBase(o.managementType);
    const discLevel = getDiscLevel(o.managementType);
    const mgmtBadgeClass = isPkg ? 'mgmt-패키지' :
      !mgmtBase ? 'mgmt-none' :
      discLevel === '할인+타사' ? 'mgmt-할인타사' :
      discLevel === '할인' ? 'mgmt-할인' :
      `mgmt-${mgmtBase}`;
    const mgmtDisplay = displayMgmt(o.managementType);
    const totalColspan = 1 + 1 + (hasMgmt?1:0) + 1 + (hasVisit?1:0) + 1 + 1 + 1 + (hasOffice?1:0);

    const groupIdx = mgmtGroupMap[o.managementType || ''] ?? 0;
    const shadeClass = (groupIdx % 2 === 0) ? 'mgmt-group-shade' : '';

    // 패키지 구분선 + 주의사항
    if (isPkg && !pkgSepAdded) {
      pkgSepAdded = true;
      const totalColspan = 2 + (hasOffice?1:0) + 1 + (hasMgmt?1:0) + 1 + (hasVisit?1:0) + 1 + 1 + 1;
      const pkgNote = PKG_NOTES[product.category] || '';
      rowsHtml += `<tr class="pkg-sep">
        <td colspan="${totalColspan}">
          ── 패키지 (동일 브랜드 2개 이상) ──
          ${pkgNote ? `<span class="pkg-note">${pkgNote}</span>` : ''}
        </td>
      </tr>`;
    }

    rowsHtml += `<tr id="row-${safeKey}" class="${isSelected ? 'row-selected' : ''} ${isPkg ? 'package-row' : ''} ${shadeClass}">
      <td style="width:52px;padding-left:10px">
        <button class="select-btn ${isSelected ? 'selected' : ''}"
          onclick="event.stopPropagation(); toggleRow('${escHtml(key)}', '${safeKey}')"
          id="selbtn-${safeKey}">
          ${isSelected ? '해제' : '선택'}
        </button>
      </td>
      ${hasOffice ? `<td>${officeBadge(o.recommendedOffice)}</td>` : ''}
      <td class="contract-cell">${o.contractLabel}</td>
      ${hasMgmt ? `<td><span class="mgmt-badge ${mgmtBadgeClass}">${mgmtDisplay}</span>${o.dataWarning ? '<span class="warn-row-badge">⚠️ 확인</span>' : ''}</td>` : ''}
      <td class="fee-cell">${fmtNum(o.monthlyFee)}원</td>
      ${hasVisit ? `<td>${o.visitCycle || '-'}</td>` : ''}
      <td onclick="event.stopPropagation()">
        <input class="gift-input" type="text"
          value="${fmtNum(gift)}"
          data-key="${escHtml(key)}"
          data-total="${o.totalCommission}"
          data-safe="${safeKey}"
          onchange="updateGift(this)"
          onblur="this.value=fmtNum(getGiftByKey(this.dataset.key,parseInt(this.dataset.total)))">
        <div class="cost-note-cell" id="cost-${safeKey}">×1.1 = ${fmtNum(realCost)}원</div>
      </td>
      <td class="margin-cell ${marginClass}" id="margin-${safeKey}">${fmtNum(margin)}원</td>
      <td class="total-comm">${fmtNum(o.totalCommission)}원</td>
    </tr>`;
  });

  return `<table class="options-table">
    <thead><tr>
      <th></th>
      ${hasOffice ? '<th>접수처</th>' : ''}
      <th>약정</th>
      ${hasMgmt ? '<th>관리방법</th>' : ''}
      <th>월요금</th>
      ${hasVisit ? '<th>방문주기</th>' : ''}
      <th>현금사은품(수정가능)</th>
      <th>실마진</th>
      <th>총수수료</th>
    </tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table>`;
}

// ── 토글 ──
function toggleRow(key, safeKey) {
  if (state.selectedKeys.has(key)) {
    state.selectedKeys.delete(key);
  } else {
    state.selectedKeys.add(key);
  }
  const row = document.getElementById('row-' + safeKey);
  if (row) row.classList.toggle('row-selected', state.selectedKeys.has(key));
  const btn = document.getElementById('selbtn-' + safeKey);
  if (btn) {
    const sel = state.selectedKeys.has(key);
    btn.textContent = sel ? '해제' : '선택';
    btn.classList.toggle('selected', sel);
  }
  updateCopyText();
}

// ── 사은품 자동 계산 ──
function calcAutoGift(totalCommission) {
  if (totalCommission <= state.targetMargin) return 0;
  const raw = (totalCommission - state.targetMargin) / 1.1;
  const floorUnits = Math.floor(raw / 10000);
  const ceilUnits  = Math.ceil(raw  / 10000);
  const marginFloor = totalCommission - floorUnits * 10000 * 1.1;
  const marginCeil  = totalCommission - ceilUnits  * 10000 * 1.1;
  let units = Math.abs(marginFloor - state.targetMargin) <= Math.abs(marginCeil - state.targetMargin)
    ? floorUnits : ceilUnits;
  if (units % 10 === 9) units += 1;
  return Math.max(0, units) * 10000;
}

function getGift(option) {
  const key = getOptionKey(state.productId, option);
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return calcAutoGift(option.totalCommission);
}

function getGiftByKey(key, total) {
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return calcAutoGift(total);
}

function getOptionKey(productId, option) {
  return `${productId}__${option.managementType}__${option.contractMonths}__${option.monthlyFee}`;
}

function updateGift(input) {
  const key = input.dataset.key;
  const safeKey = input.dataset.safe;
  const raw = input.value.replace(/[^0-9]/g,'');
  const val = parseInt(raw) || 0;
  state.giftOverrides[key] = val;

  const total = parseInt(input.dataset.total);
  const realCost = Math.round(val * 1.1);
  const margin = total - realCost;

  const marginEl = document.getElementById('margin-' + safeKey);
  if (marginEl) {
    marginEl.textContent = fmtNum(margin) + '원';
    marginEl.className = 'margin-cell ' + (margin >= 0 ? 'margin-pos' : 'margin-neg');
  }
  const costEl = document.getElementById('cost-' + safeKey);
  if (costEl) costEl.textContent = `×1.1 = ${fmtNum(realCost)}원`;

  input.value = fmtNum(val);
  updateCopyText();
}

function updateMargin(val) {
  const raw = val.replace(/[^0-9]/g,'');
  state.targetMargin = parseInt(raw) || 0;
  state.giftOverrides = {};
  renderMain();
}

// ── 고객 안내문 ──
function buildCopyText() {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return '';

  const selectedOpts = product.options.filter(o =>
    state.selectedKeys.has(getOptionKey(product.id, o))
  );
  if (!selectedOpts.length) return '(항목을 선택하면 여기에 표시됩니다)';

  let text = `[SK매직] ${product.name}\n`;
  if (product.modelCode) text += `모델: ${product.modelCode}\n`;
  text += '\n';

  selectedOpts.forEach(o => {
    const base = getMgmtBase(o.managementType);
    const disc = getDiscLevel(o.managementType);
    const gift = getGift(o);

    // 관리방식 레이블
    let mgmtLabel = base === '방문' ? '방문 관리'
      : base === '셀프' ? '자가 관리'
      : (o.managementType || '');

    // 방문주기
    const cycleStr = o.visitCycle ? ` (${o.visitCycle} 주기)` : '';

    // 타사보상만 표기 (할인 적용 문구 제거)
    const tasaStr = disc === '할인+타사' ? ' | 타사보상' : '';

    // 📍 관리방식 | 약정 | (방문주기) | 타사보상
    text += `📍 ${mgmtLabel} | ${o.contractLabel} 약정${cycleStr}${tasaStr}\n`;

    // 요금 | 사은품
    text += `월 ${fmtNum(o.monthlyFee)}원`;
    if (gift > 0) text += ` | 현금사은품 ${fmtNum(gift)}원`;
    text += '\n\n';
  });

  return text.trim();
}

function updateCopyText() {
  const el = document.getElementById('copy-text');
  if (el) el.value = buildCopyText();
}

function copyAll() {
  const text = document.getElementById('copy-text')?.value;
  if (!text || text.startsWith('(')) return;
  navigator.clipboard.writeText(text).then(() => showToast('안내문 복사 완료 ✓'))
    .catch(() => {
      const el = document.getElementById('copy-text');
      el.select(); document.execCommand('copy');
      showToast('안내문 복사 완료 ✓');
    });
}

// ── 유틸 ──
// 관리방법 표시명 단축
function displayMgmt(mgmt) {
  if (!mgmt) return '-';
  return mgmt
    .replace('방문할인+타사보상_패키지', '방문+타사+패키지')
    .replace('셀프할인+타사보상_패키지', '셀프+타사+패키지')
    .replace('방문할인+타사보상', '방문+타사')
    .replace('셀프할인+타사보상', '셀프+타사')
    .replace('무방문형할인_패키지', '무방문+패키지')
    .replace('무방문형할인', '무방문')
    .replace('방문할인_패키지', '방문+패키지')
    .replace('셀프할인_패키지', '셀프+패키지')
    .replace('방문할인', '방문')
    .replace('셀프할인', '셀프');
}

function officeBadge(office) {
  if (!office) return '<span class="office-none">-</span>';
  return `<span class="office-badge office-${office}">${office}</span>`;
}

function getMgmtBase(mgmt) {
  if (!mgmt) return '';
  if (mgmt.includes('방문')) return '방문';
  if (mgmt.includes('셀프')) return '셀프';
  if (mgmt.includes('무방문형')) return '무방문형';
  return mgmt;
}

function getDiscLevel(mgmt) {
  if (!mgmt) return '기본';
  if (mgmt.includes('+타사보상') || mgmt.includes('타사보상')) return '할인+타사';
  if (mgmt.includes('할인')) return '할인';
  return '기본';
}

function fmtNum(n) {
  if (n === null || n === undefined) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function togglePromo(el) {
  const txt = el.nextElementSibling;
  if (txt) txt.classList.toggle('open');
  el.textContent = txt?.classList.contains('open') ? '▼ 4월 프로모션 접기' : '▶ 4월 프로모션 확인';
}

function switchBrand(brand) {}

init();
</script>
