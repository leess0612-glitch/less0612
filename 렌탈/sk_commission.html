<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>렌탈 수수료 조회 시스템</title>
<style>
  :root {
    --brand: #0066cc;
    --brand-light: #e8f0fd;
    --accent: #e05500;
    --green: #1a8a3c;
    --gray-50: #f8f9fa;
    --gray-100: #f0f2f5;
    --gray-200: #e4e7ec;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
    font-size: 13px;
    background: var(--gray-100);
    color: var(--gray-800);
  }

  /* ── 헤더 ── */
  header {
    background: var(--brand);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  header .meta { font-size: 11px; opacity: .8; }
  header .brand-tabs { display: flex; gap: 4px; margin-left: auto; }
  .brand-tab {
    padding: 4px 12px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,.15); color: #fff; font-size: 12px;
    border: 1px solid rgba(255,255,255,.3);
  }
  .brand-tab.active { background: #fff; color: var(--brand); font-weight: 700; }

  /* ── 레이아웃 ── */
  .layout { display: flex; height: calc(100vh - 44px); overflow: hidden; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 220px; min-width: 220px;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 12px;
    font-size: 11px; font-weight: 700; color: var(--gray-600);
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .cat-list { display: flex; flex-direction: column; }
  .cat-btn {
    padding: 9px 14px;
    text-align: left; cursor: pointer;
    border: none; background: none;
    font-size: 13px; color: var(--gray-700);
    border-bottom: 1px solid var(--gray-100);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cat-btn:hover { background: var(--brand-light); }
  .cat-btn.active { background: var(--brand-light); color: var(--brand); font-weight: 700; }
  .cat-btn .count {
    font-size: 10px; background: var(--gray-200); color: var(--gray-600);
    padding: 1px 6px; border-radius: 10px;
  }
  .cat-btn.active .count { background: var(--brand); color: #fff; }

  .prod-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--gray-200);
  }
  .prod-search input {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 12px; outline: none;
  }
  .prod-search input:focus { border-color: var(--brand); }

  .prod-list { overflow-y: auto; flex: 1; }
  .prod-item {
    padding: 8px 14px; cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
    font-size: 12px; line-height: 1.4;
  }
  .prod-item:hover { background: var(--brand-light); }
  .prod-item.active { background: var(--brand); color: #fff; }
  .prod-item .model { font-size: 10px; opacity: .7; margin-top: 1px; }
  .prod-item.active .model { opacity: .85; }

  /* ── 메인 영역 ── */
  .main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── 카드 ── */
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 10px 16px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header h2 { font-size: 14px; font-weight: 700; }
  .card-body { padding: 14px 16px; }

  /* ── 제품 정보 카드 ── */
  .product-info {
    display: flex; align-items: flex-start; gap: 16px;
  }
  .product-info .model-badge {
    background: var(--brand); color: #fff;
    padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .product-info .name { font-size: 18px; font-weight: 700; }
  .product-info .note {
    margin-top: 4px; font-size: 11px; color: var(--accent);
    background: #fff5f0; padding: 3px 8px; border-radius: 4px; display: inline-block;
  }
  .product-info .promo-toggle {
    margin-top: 6px; font-size: 11px; color: var(--brand); cursor: pointer;
    text-decoration: underline;
  }
  .promo-text {
    margin-top: 6px; font-size: 11px; color: var(--gray-600);
    white-space: pre-wrap; background: var(--gray-50);
    padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--brand-light);
    display: none;
  }
  .promo-text.open { display: block; }
  .detail-btn {
    margin-left: auto; padding: 6px 14px;
    background: none; border: 1px solid var(--brand); color: var(--brand);
    border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .detail-btn:hover { background: var(--brand); color: #fff; }

  /* ── 안내문 카드 강조 ── */
  .notice-card {
    border: 2px solid var(--brand);
    box-shadow: 0 4px 16px rgba(0,102,204,.15);
  }
  .notice-header {
    background: var(--brand) !important;
    border-bottom: none !important;
    padding: 12px 16px !important;
  }
  .notice-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
  .copy-all-btn {
    margin-left: auto;
    padding: 6px 16px;
    background: rgba(255,255,255,.2); color: #fff;
    border: 1px solid rgba(255,255,255,.5); border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 700;
    transition: background .15s;
  }
  .copy-all-btn:hover { background: rgba(255,255,255,.35); }
  .copy-all-btn:active { transform: scale(.98); }
  .copy-textarea {
    width: 100%;
    min-height: 200px;
    padding: 14px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 14px; line-height: 1.8;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    resize: vertical;
    background: #fff;
    color: var(--gray-800);
    outline: none;
  }
  .copy-textarea:focus { border-color: var(--brand); }

  /* ── 옵션 선택기 (드롭박스) ── */
  .option-selector { display: flex; flex-direction: column; gap: 14px; }
  .option-dropdowns {
    display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--gray-200);
  }
  .dropdown-group { display: flex; flex-direction: column; gap: 4px; }
  .dropdown-label { font-size: 11px; font-weight: 700; color: var(--gray-600); }
  .option-select {
    padding: 7px 10px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 13px; outline: none; cursor: pointer;
    background: #fff; min-width: 150px;
    font-family: inherit;
  }
  .option-select:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(0,102,204,.1); }

  /* ── 옵션 상세 패널 ── */
  .option-detail {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .detail-row { display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .gift-row {
    padding-top: 14px;
    border-top: 1px solid var(--gray-200);
    gap: 24px;
  }
  .detail-item { display: flex; flex-direction: column; gap: 3px; }
  .detail-label { font-size: 10px; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .3px; }
  .detail-value { font-size: 16px; font-weight: 700; color: var(--gray-800); }
  .fee-value { color: var(--brand); font-size: 20px; }
  .comm-value { color: var(--green); font-size: 18px; }
  .cost-note { font-size: 11px; color: var(--gray-400); margin-top: 2px; }
  .margin-pos { color: var(--green); }
  .margin-neg { color: #dc2626; }

  .gift-input-lg {
    width: 110px; padding: 7px 10px;
    border: 1.5px solid var(--accent); border-radius: 6px;
    font-size: 15px; font-weight: 700; text-align: right; outline: none;
    color: var(--accent); font-family: inherit;
  }
  .gift-input-lg:focus { box-shadow: 0 0 0 2px rgba(224,85,0,.15); }
  .margin-setting-inline {
    display: flex; align-items: center; gap: 6px; margin-left: auto;
  }
  .margin-setting-inline label { font-size: 11px; font-weight: 700; color: var(--gray-600); white-space: nowrap; }
  .margin-input-field {
    width: 100px; padding: 7px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 13px; text-align: right; outline: none; font-family: inherit;
  }
  .margin-input-field:focus { border-color: var(--brand); }

  .copy-row-btn {
    padding: 3px 8px; border-radius: 4px;
    background: none; border: 1px solid var(--gray-200); cursor: pointer;
    font-size: 11px; color: var(--gray-600);
  }
  .copy-row-btn:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* ── 빈 상태 ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 0; color: var(--gray-400);
    gap: 8px;
  }
  .empty-state .icon { font-size: 36px; }
  .empty-state p { font-size: 13px; }

  /* ── 토스트 ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ── 반응형 ── */
  @media (max-width: 900px) {
    .sidebar { width: 180px; min-width: 180px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏠 렌탈 수수료 조회 시스템</h1>
    <div class="meta" id="meta-info">데이터 로딩 중...</div>
  </div>
  <div class="brand-tabs">
    <div class="brand-tab active" onclick="switchBrand('sk')">SK매직</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">LG전자</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">코웨이</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">쿠쿠</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">청호</div>
  </div>
</header>

<div class="layout">
  <!-- 사이드바: 카테고리 + 제품 목록 -->
  <div class="sidebar">
    <div class="sidebar-header">카테고리</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="prod-search">
      <input type="text" id="prod-search" placeholder="제품 검색..." oninput="filterProducts()">
    </div>
    <div class="sidebar-header">제품 목록</div>
    <div class="prod-list" id="prod-list"></div>
  </div>

  <!-- 메인 -->
  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>좌측에서 제품을 선택하세요</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 데이터 (parse_excel.py 실행 시 자동 갱신)
// ═══════════════════════════════════════════
const DB = __SK_DATA__;

// ═══════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════
let state = {
  category: '전체',
  productId: null,
  selectedOptionKey: null,
  targetMargin: 150000,
  giftOverrides: {},
  searchText: '',
};

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
function init() {
  const meta = DB.metadata;
  document.getElementById('meta-info').textContent =
    `${meta.brand} ${meta.sheetTitle || ''} · 파싱: ${meta.parsedAt}`;
  renderCategoryList();
  renderProductList();
}

// ═══════════════════════════════════════════
// 카테고리
// ═══════════════════════════════════════════
function getCategories() {
  const counts = { '전체': DB.products.length };
  DB.products.forEach(p => {
    counts[p.category] = (counts[p.category] || 0) + 1;
  });
  return counts;
}

function renderCategoryList() {
  const el = document.getElementById('cat-list');
  const cats = getCategories();
  const order = ['전체', '정수기', '공기청정기', '비데', '매트리스', '기타'];
  el.innerHTML = order.filter(c => cats[c]).map(c => `
    <button class="cat-btn ${state.category === c ? 'active' : ''}"
      onclick="selectCategory('${c}')">
      ${c} <span class="count">${cats[c]}</span>
    </button>
  `).join('');
}

function selectCategory(cat) {
  state.category = cat;
  state.productId = null;
  state.selectedOptionKey = null;
  state.searchText = '';
  document.getElementById('prod-search').value = '';
  renderCategoryList();
  renderProductList();
  renderMain();
}

// ═══════════════════════════════════════════
// 제품 목록
// ═══════════════════════════════════════════
function getFilteredProducts() {
  return DB.products.filter(p => {
    const matchCat = state.category === '전체' || p.category === state.category;
    const matchSearch = !state.searchText ||
      p.name.includes(state.searchText) ||
      p.modelCode.toLowerCase().includes(state.searchText.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderProductList() {
  const el = document.getElementById('prod-list');
  const products = getFilteredProducts();
  if (!products.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">검색 결과 없음</div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="prod-item ${p.id === state.productId ? 'active' : ''}"
      onclick="selectProduct('${p.id}')">
      <div>${p.name}</div>
      <div class="model">${p.modelCode || ''}</div>
    </div>
  `).join('');
}

function filterProducts() {
  state.searchText = document.getElementById('prod-search').value.trim();
  renderProductList();
}

function selectProduct(id) {
  state.productId = id;
  state.selectedOptionKey = null;
  renderProductList();
  renderMain();
}

// ═══════════════════════════════════════════
// 메인 영역
// ═══════════════════════════════════════════
function renderMain() {
  const el = document.getElementById('main-content');
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">📋</div><p>좌측에서 제품을 선택하세요</p>
    </div>`;
    return;
  }

  el.innerHTML = `
    <!-- 제품 정보 카드 -->
    <div class="card">
      <div class="card-body">
        <div class="product-info">
          <div>
            ${product.modelCode ? `<span class="model-badge">${product.modelCode}</span>` : ''}
            <div class="name" style="margin-top:${product.modelCode ? '6px':'0'}">${product.name}</div>
            ${product.note ? `<span class="note">⚠️ ${product.note}</span>` : ''}
            ${product.promotionNote ? `
              <div class="promo-toggle" onclick="togglePromo(this)">▶ 4월 프로모션 확인</div>
              <div class="promo-text">${escHtml(product.promotionNote)}</div>
            ` : ''}
          </div>
          <button class="detail-btn" onclick="openSkMagic('${escHtml(product.modelCode || product.name)}')">
            🔍 SK매직 확인
          </button>
        </div>
      </div>
    </div>

    <!-- 고객 안내문 카드 (강조) -->
    <div class="card notice-card">
      <div class="card-header notice-header">
        <h2>📢 고객 안내문</h2>
        <button class="copy-all-btn" onclick="copyAll()">📋 복사</button>
      </div>
      <div class="card-body">
        <textarea class="copy-textarea" id="copy-text" readonly></textarea>
      </div>
    </div>

    <!-- 요금 & 수수료 카드 -->
    <div class="card">
      <div class="card-header">
        <h2>📊 요금 &amp; 수수료</h2>
      </div>
      <div class="card-body">
        ${renderOptionSelector(product)}
      </div>
    </div>
  `;

  updateCopyText();
}

// ═══════════════════════════════════════════
// 옵션 선택기 (드롭박스)
// ═══════════════════════════════════════════
function renderOptionSelector(product) {
  const opts = product.options;
  if (!opts.length) return '<div class="empty-state" style="padding:24px"><p>옵션 없음</p></div>';

  // 선택된 옵션 확인/초기화
  let selectedOpt = null;
  if (state.selectedOptionKey) {
    selectedOpt = opts.find(o => getOptionKey(product.id, o) === state.selectedOptionKey);
  }
  if (!selectedOpt) {
    selectedOpt = opts[0];
    state.selectedOptionKey = getOptionKey(product.id, selectedOpt);
  }

  const selectedMgmt = selectedOpt.managementType || '';

  // 관리방법 목록 (중복 제거, 순서 유지)
  const seen = new Set();
  const uniqueMgmt = [];
  opts.forEach(o => {
    const m = o.managementType || '';
    if (!seen.has(m)) { seen.add(m); uniqueMgmt.push(m); }
  });

  // 선택된 관리방법에 해당하는 약정 옵션
  const contractOpts = opts.filter(o => (o.managementType || '') === selectedMgmt);

  return `
    <div class="option-selector">
      <div class="option-dropdowns">
        <div class="dropdown-group">
          <label class="dropdown-label">관리방법</label>
          <select class="option-select" onchange="onMgmtChange(this.value)">
            ${uniqueMgmt.map(m => `
              <option value="${escHtml(m)}" ${m === selectedMgmt ? 'selected' : ''}>
                ${m || '기본'}
              </option>
            `).join('')}
          </select>
        </div>
        <div class="dropdown-group">
          <label class="dropdown-label">약정기간</label>
          <select class="option-select" onchange="onContractChange(this.value)">
            ${contractOpts.map(o => {
              const key = getOptionKey(product.id, o);
              return `<option value="${escHtml(key)}" ${key === state.selectedOptionKey ? 'selected' : ''}>${o.contractLabel}</option>`;
            }).join('')}
          </select>
        </div>
        <div class="margin-setting-inline">
          <label>목표 마진</label>
          <input type="text" class="margin-input-field" id="margin-input"
            value="${fmtNum(state.targetMargin)}"
            onchange="updateMargin(this.value)"
            onblur="this.value=fmtNum(state.targetMargin)">
          <span style="color:var(--gray-600);font-size:12px">원</span>
        </div>
      </div>
      ${renderOptionDetail(product, selectedOpt)}
    </div>
  `;
}

function renderOptionDetail(product, opt) {
  const key = getOptionKey(product.id, opt);
  const gift = getGift(opt);
  const realCost = Math.round(gift * 1.1);
  const margin = opt.totalCommission - realCost;
  const marginClass = margin >= 0 ? 'margin-pos' : 'margin-neg';
  const safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');

  return `
    <div class="option-detail">
      <div class="detail-row">
        <div class="detail-item">
          <span class="detail-label">월 요금</span>
          <span class="detail-value fee-value">${fmtNum(opt.monthlyFee)}원</span>
        </div>
        ${opt.visitCycle ? `
          <div class="detail-item">
            <span class="detail-label">방문주기</span>
            <span class="detail-value">${opt.visitCycle}</span>
          </div>
        ` : ''}
        ${opt.registrationFee ? `
          <div class="detail-item">
            <span class="detail-label">등록비</span>
            <span class="detail-value">${fmtNum(opt.registrationFee)}원</span>
          </div>
        ` : ''}
        <div class="detail-item">
          <span class="detail-label">총 수수료</span>
          <span class="detail-value comm-value">${fmtNum(opt.totalCommission)}원</span>
        </div>
      </div>
      <div class="detail-row gift-row">
        <div class="detail-item">
          <span class="detail-label">현금 사은품</span>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            <input class="gift-input-lg" type="text"
              value="${fmtNum(gift)}"
              data-key="${escHtml(key)}"
              data-total="${opt.totalCommission}"
              onchange="updateGift(this)"
              onblur="this.value=fmtNum(getGiftByKey(this.dataset.key, parseInt(this.dataset.total)))">
            <span style="font-size:13px;color:var(--gray-600)">원</span>
          </div>
          <span class="cost-note" id="cost-note-${safeKey}">실비용 ${fmtNum(realCost)}원 (×1.1)</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">실 마진</span>
          <span class="detail-value ${marginClass}" id="margin-${safeKey}">${fmtNum(margin)}원</span>
        </div>
        <div style="margin-left:auto;align-self:flex-end">
          <button class="copy-row-btn" style="padding:6px 14px;font-size:12px" onclick="copyRow('${escHtml(key)}')">이 옵션 복사</button>
        </div>
      </div>
    </div>
  `;
}

function onMgmtChange(mgmt) {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return;
  const firstOpt = product.options.find(o => (o.managementType || '') === mgmt);
  if (firstOpt) state.selectedOptionKey = getOptionKey(product.id, firstOpt);
  renderMain();
}

function onContractChange(key) {
  state.selectedOptionKey = key;
  renderMain();
}

// ═══════════════════════════════════════════
// 사은품 자동 계산
// ═══════════════════════════════════════════
function calcAutoGift(totalCommission) {
  // 실마진 = totalCommission - gift × 1.1 ≈ targetMargin
  // → gift = (totalCommission - targetMargin) / 1.1
  if (totalCommission <= state.targetMargin) return 0;

  const raw = (totalCommission - state.targetMargin) / 1.1;
  const floorUnits = Math.floor(raw / 10000);
  const ceilUnits  = Math.ceil(raw  / 10000);

  const marginFloor = totalCommission - floorUnits * 10000 * 1.1;
  const marginCeil  = totalCommission - ceilUnits  * 10000 * 1.1;

  // 실마진이 목표에 더 가까운 쪽 선택
  let units = Math.abs(marginFloor - state.targetMargin) <= Math.abs(marginCeil - state.targetMargin)
    ? floorUnits : ceilUnits;

  // 만원 단위 자릿수가 9로 끝나면 올림 (예: 9만→10만, 19만→20만)
  if (units % 10 === 9) units += 1;

  return Math.max(0, units) * 10000;
}

function getGift(option) {
  const key = getOptionKey(state.productId, option);
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return calcAutoGift(option.totalCommission);
}

function getGiftByKey(key, total) {
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return calcAutoGift(total);
}

function getOptionKey(productId, option) {
  return `${productId}__${option.managementType}__${option.contractMonths}__${option.monthlyFee}`;
}

function updateGift(input) {
  const key = input.dataset.key;
  const raw = input.value.replace(/[^0-9]/g,'');
  const val = parseInt(raw) || 0;
  state.giftOverrides[key] = val;

  const total = parseInt(input.dataset.total);
  const realCost = Math.round(val * 1.1);
  const margin = total - realCost;
  const safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');

  const marginEl = document.getElementById('margin-' + safeKey);
  if (marginEl) {
    marginEl.textContent = fmtNum(margin) + '원';
    marginEl.className = 'detail-value ' + (margin >= 0 ? 'margin-pos' : 'margin-neg');
  }
  const costNote = document.getElementById('cost-note-' + safeKey);
  if (costNote) costNote.textContent = `실비용 ${fmtNum(realCost)}원 (×1.1)`;

  input.value = fmtNum(val);
  updateCopyText();
}

function updateMargin(val) {
  const raw = val.replace(/[^0-9]/g,'');
  state.targetMargin = parseInt(raw) || 0;
  state.giftOverrides = {};
  renderMain();
}

// ═══════════════════════════════════════════
// 고객 안내문
// ═══════════════════════════════════════════
function buildCopyText() {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return '';

  const opt = state.selectedOptionKey
    ? product.options.find(o => getOptionKey(product.id, o) === state.selectedOptionKey)
    : product.options[0];
  if (!opt) return '';

  const gift = getGift(opt);
  const mgmtBase = getMgmtBase(opt.managementType);
  const discLevel = getDiscLevel(opt.managementType);

  const line = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  let text = `${line}\n`;
  text += `[SK매직] ${product.name}\n`;
  if (product.modelCode) text += `모델: ${product.modelCode}\n`;
  text += `${line}\n\n`;

  if (opt.managementType) {
    let mgmtLine = '';
    if (mgmtBase === '방문') mgmtLine = `📍 방문 관리${opt.visitCycle ? ` (${opt.visitCycle} 주기)` : ''}`;
    else if (mgmtBase === '셀프') mgmtLine = `📍 자가 관리`;
    else mgmtLine = `📍 ${opt.managementType}`;
    if (discLevel === '할인') mgmtLine += ' [할인 적용]';
    else if (discLevel === '할인+타사') mgmtLine += ' [타사 보상 할인]';
    text += mgmtLine + '\n';
  }

  text += `• ${opt.contractLabel} 약정 | 월 ${fmtNum(opt.monthlyFee)}원`;
  if (gift > 0) text += ` | 현금사은품 ${fmtNum(gift)}원`;
  text += '\n\n';

  text += '✅ 현금사은품은 설치 후 즉시 지급됩니다\n';
  text += '✅ 등록비 별도 / 상담 문의 주세요';
  return text.trim();
}

function updateCopyText() {
  const el = document.getElementById('copy-text');
  if (el) el.value = buildCopyText();
}

function copyAll() {
  const text = document.getElementById('copy-text')?.value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('안내문 복사 완료 ✓'))
    .catch(() => {
      const el = document.getElementById('copy-text');
      el.select();
      document.execCommand('copy');
      showToast('안내문 복사 완료 ✓');
    });
}

function copyRow(key) {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return;
  const opt = product.options.find(o => getOptionKey(product.id, o) === key);
  if (!opt) return;
  const gift = getGift(opt);
  const line = `[SK매직] ${product.name} | ${opt.contractLabel} 약정 | 월 ${fmtNum(opt.monthlyFee)}원${gift > 0 ? ` | 현금사은품 ${fmtNum(gift)}원` : ''}`;
  navigator.clipboard.writeText(line).then(() => showToast('행 복사 완료 ✓'))
    .catch(() => showToast('복사 실패'));
}

// ═══════════════════════════════════════════
// 유틸
// ═══════════════════════════════════════════
function getMgmtBase(mgmt) {
  if (!mgmt) return '';
  if (mgmt.includes('방문')) return '방문';
  if (mgmt.includes('셀프')) return '셀프';
  if (mgmt.includes('무방문형')) return '무방문형';
  return mgmt;
}

function getDiscLevel(mgmt) {
  if (!mgmt) return '기본';
  if (mgmt.includes('+타사보상') || mgmt.includes('타사보상')) return '할인+타사';
  if (mgmt.includes('할인')) return '할인';
  return '기본';
}

function fmtNum(n) {
  if (n === null || n === undefined) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function togglePromo(el) {
  const txt = el.nextElementSibling;
  if (txt) txt.classList.toggle('open');
  el.textContent = txt?.classList.contains('open') ? '▼ 4월 프로모션 접기' : '▶ 4월 프로모션 확인';
}

function openSkMagic(query) {
  const url = `https://search.naver.com/search.naver?query=SK매직+${encodeURIComponent(query)}`;
  window.open(url, '_blank');
}

function switchBrand(brand) {
  // 추후 다른 브랜드 추가 시 구현
}

// 시작
init();
</script>
