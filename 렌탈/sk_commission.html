<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>렌탈 수수료 조회 시스템</title>
<style>
  :root {
    --brand: #0066cc;
    --brand-light: #e8f0fd;
    --accent: #e05500;
    --green: #1a8a3c;
    --gray-50: #f8f9fa;
    --gray-100: #f0f2f5;
    --gray-200: #e4e7ec;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-800: #1f2937;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', -apple-system, sans-serif;
    font-size: 13px;
    background: var(--gray-100);
    color: var(--gray-800);
  }

  /* ── 헤더 ── */
  header {
    background: var(--brand);
    color: #fff;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  header h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
  header .meta { font-size: 11px; opacity: .8; }
  header .brand-tabs { display: flex; gap: 4px; margin-left: auto; }
  .brand-tab {
    padding: 4px 12px; border-radius: 16px; cursor: pointer;
    background: rgba(255,255,255,.15); color: #fff; font-size: 12px;
    border: 1px solid rgba(255,255,255,.3);
  }
  .brand-tab.active { background: #fff; color: var(--brand); font-weight: 700; }

  /* ── 레이아웃 ── */
  .layout { display: flex; height: calc(100vh - 44px); overflow: hidden; }

  /* ── 사이드바 ── */
  .sidebar {
    width: 220px; min-width: 220px;
    background: #fff;
    border-right: 1px solid var(--gray-200);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 12px;
    font-size: 11px; font-weight: 700; color: var(--gray-600);
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    text-transform: uppercase; letter-spacing: .5px;
  }
  .cat-list { display: flex; flex-direction: column; }
  .cat-btn {
    padding: 9px 14px;
    text-align: left; cursor: pointer;
    border: none; background: none;
    font-size: 13px; color: var(--gray-700);
    border-bottom: 1px solid var(--gray-100);
    display: flex; justify-content: space-between; align-items: center;
  }
  .cat-btn:hover { background: var(--brand-light); }
  .cat-btn.active { background: var(--brand-light); color: var(--brand); font-weight: 700; }
  .cat-btn .count {
    font-size: 10px; background: var(--gray-200); color: var(--gray-600);
    padding: 1px 6px; border-radius: 10px;
  }
  .cat-btn.active .count { background: var(--brand); color: #fff; }

  .prod-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--gray-200);
  }
  .prod-search input {
    width: 100%; padding: 5px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 12px; outline: none;
  }
  .prod-search input:focus { border-color: var(--brand); }

  .prod-list { overflow-y: auto; flex: 1; }
  .prod-item {
    padding: 8px 14px; cursor: pointer;
    border-bottom: 1px solid var(--gray-100);
    font-size: 12px; line-height: 1.4;
  }
  .prod-item:hover { background: var(--brand-light); }
  .prod-item.active { background: var(--brand); color: #fff; }
  .prod-item .model { font-size: 10px; opacity: .7; margin-top: 1px; }
  .prod-item.active .model { opacity: .85; }

  /* ── 메인 영역 ── */
  .main { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── 카드 ── */
  .card {
    background: #fff;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    padding: 10px 16px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; gap: 8px;
  }
  .card-header h2 { font-size: 14px; font-weight: 700; }
  .card-body { padding: 14px 16px; }

  /* ── 제품 정보 카드 ── */
  .product-info {
    display: flex; align-items: flex-start; gap: 16px;
  }
  .product-info .model-badge {
    background: var(--brand); color: #fff;
    padding: 4px 10px; border-radius: 6px;
    font-size: 12px; font-weight: 700; white-space: nowrap;
  }
  .product-info .name { font-size: 18px; font-weight: 700; }
  .product-info .note {
    margin-top: 4px; font-size: 11px; color: var(--accent);
    background: #fff5f0; padding: 3px 8px; border-radius: 4px; display: inline-block;
  }
  .product-info .promo-toggle {
    margin-top: 6px; font-size: 11px; color: var(--brand); cursor: pointer;
    text-decoration: underline;
  }
  .promo-text {
    margin-top: 6px; font-size: 11px; color: var(--gray-600);
    white-space: pre-wrap; background: var(--gray-50);
    padding: 6px 10px; border-radius: 6px; border-left: 3px solid var(--brand-light);
    display: none;
  }
  .promo-text.open { display: block; }
  .detail-btn {
    margin-left: auto; padding: 6px 14px;
    background: none; border: 1px solid var(--brand); color: var(--brand);
    border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap;
  }
  .detail-btn:hover { background: var(--brand); color: #fff; }

  /* ── 필터 바 ── */
  .filter-bar {
    display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    padding: 10px 16px;
    background: var(--gray-50);
    border-bottom: 1px solid var(--gray-200);
  }
  .filter-label { font-size: 11px; color: var(--gray-600); font-weight: 600; }
  .filter-btn {
    padding: 4px 12px; border-radius: 16px; cursor: pointer;
    border: 1px solid var(--gray-200); background: #fff;
    font-size: 12px; color: var(--gray-600);
  }
  .filter-btn:hover { border-color: var(--brand); color: var(--brand); }
  .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); font-weight: 700; }
  .filter-sep { color: var(--gray-200); margin: 0 4px; }

  /* ── 마진 설정 ── */
  .margin-setting {
    display: flex; align-items: center; gap: 8px;
    margin-left: auto;
    font-size: 12px;
  }
  .margin-setting label { color: var(--gray-600); white-space: nowrap; }
  .margin-setting input {
    width: 90px; padding: 4px 8px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 12px; text-align: right; outline: none;
  }
  .margin-setting input:focus { border-color: var(--brand); }

  /* ── 옵션 테이블 ── */
  .options-table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 12px;
  }
  thead th {
    background: var(--gray-50); padding: 8px 10px;
    text-align: center; font-weight: 600; font-size: 11px;
    color: var(--gray-600); border-bottom: 2px solid var(--gray-200);
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--gray-100); }
  tbody tr:hover { background: #f0f7ff; }
  tbody td {
    padding: 7px 10px; vertical-align: middle;
    text-align: center;
  }
  tbody td:first-child { text-align: left; }
  .mgmt-cell {
    display: flex; align-items: center; gap: 6px;
  }
  .mgmt-badge {
    display: inline-block; padding: 2px 7px;
    border-radius: 4px; font-size: 10px; font-weight: 700;
  }
  .mgmt-방문 { background: #dbeafe; color: #1d4ed8; }
  .mgmt-셀프 { background: #dcfce7; color: #166534; }
  .mgmt-무방문형 { background: #fef9c3; color: #854d0e; }
  .mgmt-none { background: var(--gray-100); color: var(--gray-600); }
  .mgmt-할인 { background: #fee2e2; color: #b91c1c; }
  .mgmt-할인타사 { background: #fce7f3; color: #9d174d; }

  .contract-cell { font-weight: 700; color: var(--brand); }
  .fee-cell { font-weight: 700; font-size: 13px; }
  .comm-cell { color: var(--gray-600); }
  .total-comm { font-weight: 700; color: var(--green); }

  .gift-cell {
    display: flex; align-items: center; gap: 4px;
  }
  .gift-input {
    width: 90px; padding: 4px 6px;
    border: 1px solid var(--gray-200); border-radius: 5px;
    font-size: 12px; text-align: right; outline: none;
    color: var(--accent); font-weight: 700;
  }
  .gift-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(224,85,0,.1); }
  .gift-warn { color: #dc2626; font-size: 10px; }

  .margin-cell { font-weight: 700; }
  .margin-pos { color: var(--green); }
  .margin-neg { color: #dc2626; }

  .copy-row-btn {
    padding: 3px 8px; border-radius: 4px;
    background: none; border: 1px solid var(--gray-200); cursor: pointer;
    font-size: 11px; color: var(--gray-600);
  }
  .copy-row-btn:hover { background: var(--brand); color: #fff; border-color: var(--brand); }

  /* ── 안내문 카드 ── */
  .copy-header {
    display: flex; align-items: center; gap: 8px;
  }
  .copy-header h2 { font-size: 14px; font-weight: 700; }
  .copy-all-btn {
    margin-left: auto;
    padding: 6px 16px;
    background: var(--brand); color: #fff;
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 12px; font-weight: 700;
  }
  .copy-all-btn:hover { background: #0055b3; }
  .copy-all-btn:active { transform: scale(.98); }

  .copy-textarea {
    width: 100%;
    min-height: 160px;
    padding: 12px;
    border: 1px solid var(--gray-200); border-radius: 6px;
    font-size: 13px; line-height: 1.7;
    font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;
    resize: vertical;
    background: var(--gray-50);
    color: var(--gray-800);
    outline: none;
  }
  .copy-textarea:focus { border-color: var(--brand); background: #fff; }

  /* ── 빈 상태 ── */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 48px 0; color: var(--gray-400);
    gap: 8px;
  }
  .empty-state .icon { font-size: 36px; }
  .empty-state p { font-size: 13px; }

  /* ── 토스트 ── */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff;
    padding: 10px 20px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; }

  /* ── 반응형 ── */
  @media (max-width: 900px) {
    .sidebar { width: 180px; min-width: 180px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🏠 렌탈 수수료 조회 시스템</h1>
    <div class="meta" id="meta-info">데이터 로딩 중...</div>
  </div>
  <div class="brand-tabs">
    <div class="brand-tab active" onclick="switchBrand('sk')">SK매직</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">LG전자</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">코웨이</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">쿠쿠</div>
    <div class="brand-tab" style="opacity:.5;cursor:default;" title="준비 중">청호</div>
  </div>
</header>

<div class="layout">
  <!-- 사이드바: 카테고리 + 제품 목록 -->
  <div class="sidebar">
    <div class="sidebar-header">카테고리</div>
    <div class="cat-list" id="cat-list"></div>
    <div class="prod-search">
      <input type="text" id="prod-search" placeholder="제품 검색..." oninput="filterProducts()">
    </div>
    <div class="sidebar-header">제품 목록</div>
    <div class="prod-list" id="prod-list"></div>
  </div>

  <!-- 메인 -->
  <div class="main" id="main-content">
    <div class="empty-state">
      <div class="icon">📋</div>
      <p>좌측에서 제품을 선택하세요</p>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════
// 데이터 (parse_excel.py 실행 시 자동 갱신)
// ═══════════════════════════════════════════
const DB = __SK_DATA__;

// ═══════════════════════════════════════════
// 상태
// ═══════════════════════════════════════════
let state = {
  category: '전체',
  productId: null,
  mgmtFilter: '전체',   // 방문 | 셀프 | 전체
  discFilter: '전체',   // 전체 | 기본 | 할인 | 할인+타사
  targetMargin: 150000,
  giftOverrides: {},    // optionKey → amount
  searchText: '',
};

// ═══════════════════════════════════════════
// 초기화
// ═══════════════════════════════════════════
function init() {
  const meta = DB.metadata;
  document.getElementById('meta-info').textContent =
    `${meta.brand} ${meta.sheetTitle || ''} · 파싱: ${meta.parsedAt}`;
  renderCategoryList();
  renderProductList();
}

// ═══════════════════════════════════════════
// 카테고리 렌더링
// ═══════════════════════════════════════════
function getCategories() {
  const counts = { '전체': DB.products.length };
  DB.products.forEach(p => {
    counts[p.category] = (counts[p.category] || 0) + 1;
  });
  return counts;
}

function renderCategoryList() {
  const el = document.getElementById('cat-list');
  const cats = getCategories();
  const order = ['전체', '정수기', '공기청정기', '비데', '매트리스', '기타'];
  el.innerHTML = order.filter(c => cats[c]).map(c => `
    <button class="cat-btn ${state.category === c ? 'active' : ''}"
      onclick="selectCategory('${c}')">
      ${c} <span class="count">${cats[c]}</span>
    </button>
  `).join('');
}

function selectCategory(cat) {
  state.category = cat;
  state.productId = null;
  state.searchText = '';
  document.getElementById('prod-search').value = '';
  renderCategoryList();
  renderProductList();
  renderMain();
}

// ═══════════════════════════════════════════
// 제품 목록 렌더링
// ═══════════════════════════════════════════
function getFilteredProducts() {
  return DB.products.filter(p => {
    const matchCat = state.category === '전체' || p.category === state.category;
    const matchSearch = !state.searchText ||
      p.name.includes(state.searchText) ||
      p.modelCode.toLowerCase().includes(state.searchText.toLowerCase());
    return matchCat && matchSearch;
  });
}

function renderProductList() {
  const el = document.getElementById('prod-list');
  const products = getFilteredProducts();
  if (!products.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#9ca3af;font-size:12px;">검색 결과 없음</div>';
    return;
  }
  el.innerHTML = products.map(p => `
    <div class="prod-item ${p.id === state.productId ? 'active' : ''}"
      onclick="selectProduct('${p.id}')">
      <div>${p.name}</div>
      <div class="model">${p.modelCode || ''}</div>
    </div>
  `).join('');
}

function filterProducts() {
  state.searchText = document.getElementById('prod-search').value.trim();
  renderProductList();
}

function selectProduct(id) {
  state.productId = id;
  state.mgmtFilter = '전체';
  state.discFilter = '전체';
  renderProductList();
  renderMain();
}

// ═══════════════════════════════════════════
// 메인 영역 렌더링
// ═══════════════════════════════════════════
function renderMain() {
  const el = document.getElementById('main-content');
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) {
    el.innerHTML = `<div class="empty-state">
      <div class="icon">📋</div><p>좌측에서 제품을 선택하세요</p>
    </div>`;
    return;
  }

  // 관리유형 목록 수집
  const mgmtTypes = [...new Set(product.options.map(o => getMgmtBase(o.managementType)))].filter(Boolean);
  const hasMgmt = mgmtTypes.length > 0;

  el.innerHTML = `
    <!-- 제품 정보 카드 -->
    <div class="card">
      <div class="card-body">
        <div class="product-info">
          <div>
            ${product.modelCode ? `<span class="model-badge">${product.modelCode}</span>` : ''}
            <div class="name" style="margin-top:${product.modelCode ? '6px':'0'}">${product.name}</div>
            ${product.note ? `<span class="note">⚠️ ${product.note}</span>` : ''}
            ${product.promotionNote ? `
              <div class="promo-toggle" onclick="togglePromo(this)">▶ 4월 프로모션 확인</div>
              <div class="promo-text">${escHtml(product.promotionNote)}</div>
            ` : ''}
          </div>
          <button class="detail-btn" onclick="openSkMagic('${escHtml(product.modelCode || product.name)}')">
            🔍 SK매직 확인
          </button>
        </div>
      </div>
    </div>

    <!-- 옵션 테이블 카드 -->
    <div class="card">
      <div class="card-header">
        <h2>📊 요금 & 수수료</h2>
      </div>
      <!-- 필터 -->
      <div class="filter-bar">
        ${hasMgmt ? `
          <span class="filter-label">관리</span>
          ${renderMgmtFilterBtns(mgmtTypes)}
          <span class="filter-sep">|</span>
          <span class="filter-label">조건</span>
          ${renderDiscFilterBtns(product)}
        ` : ''}
        <div class="margin-setting">
          <label>목표 마진:</label>
          <input type="text" id="margin-input"
            value="${fmtNum(state.targetMargin)}"
            onchange="updateMargin(this.value)"
            onblur="this.value=fmtNum(state.targetMargin)">
          <span style="color:var(--gray-600)">원</span>
        </div>
      </div>
      <div class="options-table-wrap">
        ${renderOptionsTable(product)}
      </div>
    </div>

    <!-- 고객 안내문 카드 -->
    <div class="card">
      <div class="card-header copy-header">
        <h2>📄 고객 안내문</h2>
        <button class="copy-all-btn" onclick="copyAll()">📋 전체 복사</button>
      </div>
      <div class="card-body">
        <textarea class="copy-textarea" id="copy-text" readonly></textarea>
      </div>
    </div>
  `;

  updateCopyText();
}

// ───────────────────────────────────────────
// 관리유형 필터 버튼
// ───────────────────────────────────────────
function getMgmtBase(mgmt) {
  if (!mgmt) return '';
  if (mgmt.includes('방문')) return '방문';
  if (mgmt.includes('셀프')) return '셀프';
  if (mgmt.includes('무방문형')) return '무방문형';
  return mgmt;
}

function getDiscLevel(mgmt) {
  if (!mgmt) return '기본';
  if (mgmt.includes('+타사보상') || mgmt.includes('타사보상')) return '할인+타사';
  if (mgmt.includes('할인')) return '할인';
  return '기본';
}

function renderMgmtFilterBtns(mgmtTypes) {
  const btns = ['전체', ...mgmtTypes];
  return btns.map(t => `
    <button class="filter-btn ${state.mgmtFilter === t ? 'active' : ''}"
      onclick="setMgmtFilter('${t}')">${t}</button>
  `).join('');
}

function renderDiscFilterBtns(product) {
  const levels = [...new Set(product.options.map(o => getDiscLevel(o.managementType)))];
  const btns = ['전체', ...levels.sort()];
  return btns.map(t => `
    <button class="filter-btn ${state.discFilter === t ? 'active' : ''}"
      onclick="setDiscFilter('${t}')">${t}</button>
  `).join('');
}

function setMgmtFilter(val) {
  state.mgmtFilter = val;
  renderMain();
}
function setDiscFilter(val) {
  state.discFilter = val;
  renderMain();
}

// ───────────────────────────────────────────
// 옵션 테이블 렌더링
// ───────────────────────────────────────────
function getVisibleOptions(product) {
  return product.options.filter(o => {
    const base = getMgmtBase(o.managementType);
    const disc = getDiscLevel(o.managementType);
    const matchMgmt = state.mgmtFilter === '전체' || base === state.mgmtFilter || (!base && state.mgmtFilter === '전체');
    const matchDisc = state.discFilter === '전체' || disc === state.discFilter;
    return matchMgmt && matchDisc;
  });
}

function getOptionKey(productId, option) {
  return `${productId}__${option.managementType}__${option.contractMonths}__${option.monthlyFee}`;
}

function getGift(option) {
  const key = getOptionKey(state.productId, option);
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return Math.max(0, option.totalCommission - state.targetMargin);
}

function renderOptionsTable(product) {
  const opts = getVisibleOptions(product);
  if (!opts.length) {
    return '<div class="empty-state" style="padding:24px"><p>해당 조건의 옵션이 없습니다</p></div>';
  }

  const hasMgmt = opts.some(o => o.managementType);
  const hasVisit = opts.some(o => o.visitCycle);
  const hasReg = opts.some(o => o.registrationFee > 0);

  return `<table>
    <thead><tr>
      ${hasMgmt ? '<th>관리유형</th>' : ''}
      <th>약정</th>
      <th>월 요금</th>
      ${hasVisit ? '<th>방문주기</th>' : ''}
      ${hasReg ? '<th>등록비</th>' : ''}
      <th>총 수수료</th>
      <th>현금 사은품</th>
      <th>마진</th>
      <th></th>
    </tr></thead>
    <tbody>
      ${opts.map(o => renderOptionRow(o, hasMgmt, hasVisit, hasReg)).join('')}
    </tbody>
  </table>`;
}

function renderOptionRow(o, hasMgmt, hasVisit, hasReg) {
  const key = getOptionKey(state.productId, o);
  const gift = getGift(o);
  const margin = o.totalCommission - gift;
  const marginClass = margin >= 0 ? 'margin-pos' : 'margin-neg';

  const mgmtBase = getMgmtBase(o.managementType);
  const discLevel = getDiscLevel(o.managementType);
  const mgmtBadgeClass = !mgmtBase ? 'mgmt-none' :
    discLevel === '할인+타사' ? 'mgmt-할인타사' :
    discLevel === '할인' ? 'mgmt-할인' :
    `mgmt-${mgmtBase}`;
  const mgmtLabel = o.managementType || '-';

  const extraLabel = o.label && !/^[A-Z0-9\-]+$/.test(o.label) ? o.label : '';

  return `<tr>
    ${hasMgmt ? `<td>
      <span class="mgmt-badge ${mgmtBadgeClass}">${mgmtLabel}</span>
      ${extraLabel ? `<small style="color:var(--accent);font-size:10px">${extraLabel}</small>` : ''}
    </td>` : ''}
    <td class="contract-cell">${o.contractLabel}</td>
    <td class="fee-cell">${fmtNum(o.monthlyFee)}원</td>
    ${hasVisit ? `<td>${o.visitCycle || '-'}</td>` : ''}
    ${hasReg ? `<td class="comm-cell">${o.registrationFee ? fmtNum(o.registrationFee)+'원' : '-'}</td>` : ''}
    <td class="total-comm">${fmtNum(o.totalCommission)}원</td>
    <td>
      <div class="gift-cell">
        <input class="gift-input" type="text"
          value="${fmtNum(gift)}"
          data-key="${escHtml(key)}"
          data-total="${o.totalCommission}"
          onchange="updateGift(this)"
          onblur="this.value=fmtNum(getGiftByKey(this.dataset.key, parseInt(this.dataset.total)))">
        <span style="font-size:11px;color:var(--gray-400)">원</span>
      </div>
    </td>
    <td class="margin-cell ${marginClass}" id="margin-${escHtml(key).replace(/[^a-zA-Z0-9]/g,'_')}">${fmtNum(margin)}원</td>
    <td><button class="copy-row-btn" onclick="copyRow('${escHtml(key)}')">복사</button></td>
  </tr>`;
}

function getGiftByKey(key, total) {
  if (state.giftOverrides[key] !== undefined) return state.giftOverrides[key];
  return Math.max(0, total - state.targetMargin);
}

function updateGift(input) {
  const key = input.dataset.key;
  const raw = input.value.replace(/[^0-9]/g,'');
  const val = parseInt(raw) || 0;
  state.giftOverrides[key] = val;
  const total = parseInt(input.dataset.total);
  const margin = total - val;
  const safeKey = key.replace(/[^a-zA-Z0-9]/g,'_');
  const marginEl = document.getElementById('margin-' + safeKey);
  if (marginEl) {
    marginEl.textContent = fmtNum(margin) + '원';
    marginEl.className = 'margin-cell ' + (margin >= 0 ? 'margin-pos' : 'margin-neg');
  }
  input.value = fmtNum(val);
  updateCopyText();
}

function updateMargin(val) {
  const raw = val.replace(/[^0-9]/g,'');
  state.targetMargin = parseInt(raw) || 0;
  state.giftOverrides = {}; // 마진 변경 시 재계산
  renderMain();
}

// ───────────────────────────────────────────
// 고객 안내문 생성
// ───────────────────────────────────────────
function buildCopyText() {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return '';

  const opts = getVisibleOptions(product);
  if (!opts.length) return '';

  // 관리유형별 그룹
  const groups = {};
  opts.forEach(o => {
    const gk = o.managementType || '기본';
    if (!groups[gk]) groups[gk] = [];
    groups[gk].push(o);
  });

  const line = '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━';
  let text = `${line}\n`;
  text += `[SK매직] ${product.name}\n`;
  if (product.modelCode) text += `모델: ${product.modelCode}\n`;
  text += `${line}\n\n`;

  Object.entries(groups).forEach(([mgmt, options]) => {
    const mgmtBase = getMgmtBase(mgmt);
    const discLevel = getDiscLevel(mgmt);

    // 관리 타입 표시
    if (mgmt && mgmt !== '기본') {
      const visitCycle = options[0]?.visitCycle;
      let mgmtLine = '';
      if (mgmtBase === '방문') mgmtLine = `📍 방문 관리${visitCycle ? ` (${visitCycle} 주기)` : ''}`;
      else if (mgmtBase === '셀프') mgmtLine = `📍 자가 관리`;
      else mgmtLine = `📍 ${mgmt}`;
      if (discLevel === '할인') mgmtLine += ' [할인 적용]';
      else if (discLevel === '할인+타사') mgmtLine += ' [타사 보상 할인]';
      text += mgmtLine + '\n';
    }

    options.forEach(o => {
      const gift = getGift(o);
      text += `• ${o.contractLabel} 약정 | 월 ${fmtNum(o.monthlyFee)}원`;
      if (gift > 0) text += ` | 현금사은품 ${fmtNum(gift)}원`;
      text += '\n';
    });
    text += '\n';
  });

  text += '✅ 현금사은품은 설치 후 즉시 지급됩니다\n';
  text += '✅ 등록비 별도 / 상담 문의 주세요';
  return text.trim();
}

function updateCopyText() {
  const el = document.getElementById('copy-text');
  if (el) el.value = buildCopyText();
}

function copyAll() {
  const text = document.getElementById('copy-text')?.value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('안내문 복사 완료 ✓'))
    .catch(() => {
      // 폴백
      const el = document.getElementById('copy-text');
      el.select();
      document.execCommand('copy');
      showToast('안내문 복사 완료 ✓');
    });
}

function copyRow(key) {
  const product = DB.products.find(p => p.id === state.productId);
  if (!product) return;

  const opts = product.options;
  const opt = opts.find(o => getOptionKey(state.productId, o) === key);
  if (!opt) return;

  const gift = getGift(opt);
  const line = `[SK매직] ${product.name} | ${opt.contractLabel} 약정 | 월 ${fmtNum(opt.monthlyFee)}원${gift > 0 ? ` | 현금사은품 ${fmtNum(gift)}원` : ''}`;
  navigator.clipboard.writeText(line).then(() => showToast('행 복사 완료 ✓'))
    .catch(() => showToast('복사 실패'));
}

// ───────────────────────────────────────────
// 유틸
// ───────────────────────────────────────────
function fmtNum(n) {
  if (n === null || n === undefined) return '0';
  return Math.round(n).toLocaleString('ko-KR');
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function togglePromo(el) {
  const txt = el.nextElementSibling;
  if (txt) txt.classList.toggle('open');
  el.textContent = txt?.classList.contains('open') ? '▼ 4월 프로모션 접기' : '▶ 4월 프로모션 확인';
}

function openSkMagic(query) {
  const url = `https://search.naver.com/search.naver?query=SK매직+${encodeURIComponent(query)}`;
  window.open(url, '_blank');
}

function switchBrand(brand) {
  // 추후 다른 브랜드 추가 시 구현
}

// 시작
init();
</script>
