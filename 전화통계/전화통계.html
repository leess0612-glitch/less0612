<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>전화 통계 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; min-height: 100vh; }

header {
  background: #1a73e8;
  color: white;
  padding: 18px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
header h1 { font-size: 20px; font-weight: 600; }
#btn-refresh {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  padding: 7px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
#btn-refresh:hover { background: rgba(255,255,255,0.3); }
#status-msg { font-size: 13px; opacity: 0.85; }

.container { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

/* 필터 영역 */
.filter-bar {
  background: white;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 12px;
}

.period-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.period-tabs button {
  padding: 7px 16px;
  border: 1.5px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  color: #555;
  transition: all 0.15s;
}
.period-tabs button:hover { border-color: #1a73e8; color: #1a73e8; }
.period-tabs button.active { background: #1a73e8; border-color: #1a73e8; color: white; }

.filter-selects { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.filter-selects select,
.filter-selects input[type="date"],
.filter-selects input[type="week"] {
  padding: 7px 12px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  font-family: inherit;
  color: #333;
  background: white;
  cursor: pointer;
}
.filter-selects select:focus,
.filter-selects input:focus { outline: none; border-color: #1a73e8; }

/* 통계 카드 */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 20px;
}
@media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

.stat-card {
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  text-align: center;
}
.stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
.stat-card .value { font-size: 32px; font-weight: 700; line-height: 1; }
.stat-card .sub { font-size: 12px; color: #aaa; margin-top: 6px; }

#card-total .value { color: #1a73e8; }
#card-unique .value { color: #0f9d58; }
#card-accepted .value { color: #f4b400; }
#card-rate .value { color: #db4437; }

/* 차트 */
.chart-wrap {
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  margin-bottom: 20px;
  position: relative;
}
.chart-wrap h2 { font-size: 15px; color: #555; margin-bottom: 16px; font-weight: 600; }
.chart-wrap canvas { max-height: 320px; }

/* 테이블 */
.table-wrap {
  background: white;
  border-radius: 10px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  overflow-x: auto;
}
.table-wrap h2 { font-size: 15px; color: #555; margin-bottom: 14px; font-weight: 600; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead th {
  background: #f8f9fa;
  padding: 10px 12px;
  text-align: center;
  font-weight: 600;
  color: #555;
  border-bottom: 2px solid #e8e8e8;
}
tbody td {
  padding: 9px 12px;
  text-align: center;
  border-bottom: 1px solid #f0f0f0;
}
tbody tr:hover { background: #fafcff; }
.rate-cell { font-weight: 700; }
.rate-high { color: #0f9d58; }
.rate-mid { color: #f4b400; }
.rate-low { color: #db4437; }

/* 로딩 */
#loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.7);
  z-index: 999;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: #1a73e8;
}
#loading.show { display: flex; }

.no-data { text-align: center; color: #aaa; padding: 40px; font-size: 15px; }

#btn-export {
  background: #0f9d58;
  border: none;
  color: white;
  padding: 7px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
}
#btn-export:hover { background: #0b8a4b; }
#btn-export:disabled { background: #999; cursor: not-allowed; }

/* 메모 버튼 */
#btn-memo {
  background: #7c4dff;
  border: none;
  color: white;
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  display: none;
  position: relative;
}
#btn-memo:hover { background: #6a3de8; }
#btn-memo .memo-dot {
  position: absolute;
  top: -3px; right: -3px;
  width: 9px; height: 9px;
  background: #ff5252;
  border-radius: 50%;
  border: 1.5px solid white;
  display: none;
}

/* 메모 모달 */
#memo-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#memo-overlay.show { display: flex; }
#memo-modal {
  background: white;
  border-radius: 14px;
  padding: 28px 28px 22px;
  width: 480px;
  max-width: 95vw;
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
}
#memo-modal h3 {
  font-size: 16px;
  font-weight: 700;
  color: #333;
  margin-bottom: 16px;
}
.memo-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.memo-tab-btn {
  padding: 6px 18px;
  border: 1.5px solid #ddd;
  background: white;
  border-radius: 20px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  color: #555;
  transition: all 0.15s;
}
.memo-tab-btn.active { background: #7c4dff; border-color: #7c4dff; color: white; }
.memo-pane { display: none; }
.memo-pane.active { display: block; }
.memo-pane textarea {
  width: 100%;
  min-height: 140px;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  padding: 12px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;
  color: #333;
  line-height: 1.6;
}
.memo-pane textarea:focus { outline: none; border-color: #7c4dff; }
.memo-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 16px;
}
.memo-actions button {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
#btn-memo-cancel { background: #f0f0f0; color: #555; }
#btn-memo-cancel:hover { background: #e0e0e0; }
#btn-memo-save { background: #7c4dff; color: white; }
#btn-memo-save:hover { background: #6a3de8; }
</style>
</head>
<body>

<div id="loading" class="show">데이터 불러오는 중...</div>

<!-- 메모 모달 -->
<div id="memo-overlay">
  <div id="memo-modal">
    <h3 id="memo-modal-title">📝 주간 메모</h3>
    <div class="memo-tabs">
      <button class="memo-tab-btn active" data-cat="인터넷">🌐 인터넷</button>
      <button class="memo-tab-btn" data-cat="렌탈">🏠 렌탈</button>
    </div>
    <div class="memo-pane active" id="memo-pane-인터넷">
      <textarea id="memo-text-인터넷" placeholder="이 주의 인터넷 관련 메모를 입력하세요..."></textarea>
    </div>
    <div class="memo-pane" id="memo-pane-렌탈">
      <textarea id="memo-text-렌탈" placeholder="이 주의 렌탈 관련 메모를 입력하세요..."></textarea>
    </div>
    <div class="memo-actions">
      <button id="btn-memo-cancel">닫기</button>
      <button id="btn-memo-save">저장</button>
    </div>
  </div>
</div>

<header>
  <h1>📞 전화 통계 대시보드</h1>
  <div style="display:flex;align-items:center;gap:16px;">
    <span id="status-msg"></span>
    <button id="btn-export" onclick="exportExcel()">⬇ 엑셀 저장</button>
    <button id="btn-refresh" onclick="loadData()">↻ 새로고침</button>
  </div>
</header>

<div class="container">
  <div class="filter-bar">
    <div class="period-tabs">
      <button class="tab active" data-p="all">전체</button>
      <button class="tab" data-p="year">년도별</button>
      <button class="tab" data-p="month">월별</button>
      <button class="tab" data-p="week">주별</button>
      <button class="tab" data-p="day">일별</button>
      <button class="tab" data-p="range">기간</button>
    </div>
    <div class="filter-selects">
      <div id="period-selector"></div>
      <button id="btn-memo">📝 메모<span class="memo-dot"></span></button>
      <select id="category-sel">
        <option value="">전체 구분</option>
        <option value="인터넷">인터넷</option>
        <option value="렌탈">렌탈</option>
      </select>
      <select id="consultant-sel">
        <option value="">전체 상담사</option>
      </select>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card" id="card-total">
      <div class="label">총 콜수</div>
      <div class="value" id="val-total">-</div>
      <div class="sub">전체 통화 건수</div>
    </div>
    <div class="stat-card" id="card-accepted">
      <div class="label">접수 건수</div>
      <div class="value" id="val-accepted">-</div>
      <div class="sub">O/ㅇ 기준</div>
    </div>
    <div class="stat-card" id="card-rate">
      <div class="label">접수율</div>
      <div class="value" id="val-rate">-</div>
      <div class="sub">접수/총콜수</div>
    </div>
  </div>

  <div class="table-wrap">
    <h2>기간별 상세</h2>
    <div id="detail-table"></div>
  </div>

  <div class="chart-wrap" style="margin-top:20px;margin-bottom:0;">
    <h2 id="chart-title">기간별 통계</h2>
    <canvas id="mainChart"></canvas>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyzTMlDMR0lLwkbztz2257fRolw2sfT_J4wRSPUrDIvtWNRPkRnzSus5j_AL53QMxjr/exec';

let allRows = [];
let currentPeriod = 'all';
let mainChart = null;

// ──────────────────────────────────────────
// 데이터 로드 (Apps Script — 접힌/숨김 행 포함)
// ──────────────────────────────────────────
async function loadData() {
  document.getElementById('loading').classList.add('show');
  document.getElementById('status-msg').textContent = '';

  try {
    const res = await fetch(SCRIPT_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    parseScriptData(data);
    initConsultants();
    render();
    const now = new Date();
    document.getElementById('status-msg').textContent =
      `마지막 갱신: ${now.toLocaleDateString('ko-KR')} ${now.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}`;
  } catch(e) {
    alert('데이터를 불러오지 못했습니다.\n오류: ' + e.message);
    console.error(e);
  }
  document.getElementById('loading').classList.remove('show');
}

function parseDateFromValue(v) {
  if (v === null || v === undefined || v === '') return null;
  if (v instanceof Date) return isNaN(v) ? null : v;
  const s = String(v).trim();
  if (!s) return null;
  // ISO 형식 (Apps Script JSON 직렬화)
  const iso = new Date(s);
  if (!isNaN(iso)) return new Date(iso.getFullYear(), iso.getMonth(), iso.getDate());
  // YYYY-MM-DD, YYYY. M. D. 등
  const m = s.match(/(\d{4})[.\-\/]\s*(\d{1,2})[.\-\/]\s*(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
  return null;
}

function parseScriptData(data) {
  allRows = [];
  if (!data || data.length < 2) return;

  // 첫 번째 유효 날짜 찾아 초기값으로 사용 (날짜 이전 행 소급 적용)
  let firstDate = null;
  for (let i = 1; i < data.length; i++) {
    const d = parseDateFromValue(data[i][0]);
    if (d) { firstDate = d; break; }
  }

  let lastDate = firstDate;
  let rowIdx = 0;

  for (let i = 1; i < data.length; i++) { // i=0: 헤더 건너뜀
    rowIdx++;
    const row = data[i];
    const dateVal = row[0];
    const phoneStr = String(row[2] || '').replace(/[^0-9]/g, '');
    const consultant = normalizeName(String(row[3] || ''));
    const categoryRaw = String(row[4] || '').trim();
    const statusVal = String(row[5] || '').trim();

    if (dateVal !== '' && dateVal !== null && dateVal !== undefined) {
      const parsed = parseDateFromValue(dateVal);
      if (parsed) lastDate = parsed;
    }
    if (!lastDate) continue;
    const date = lastDate;

    if (statusVal === '단순') continue;

    let phone = phoneStr;
    if (phone.length === 9) phone = '0' + phone;
    if (phone.length === 10 && !phone.startsWith('0')) phone = '0' + phone;

    if (!phone || phone.length < 8) {
      if (!consultant) continue;
      phone = `NO_PHONE_${rowIdx}`;
    }

    const accepted = isAccepted(statusVal);
    const category = normalizeCategory(categoryRaw);
    allRows.push({ date, phone, consultant, category, accepted });
  }
}

function isAccepted(v) {
  const s = v.trim();
  return s === 'O' || s === 'o' || s === 'ㅇ';
}

function normalizeCategory(v) {
  const s = v.trim();
  if (!s) return ''; // 공란 = 이전 데이터
  if (s === '인' || s === '인터넷') return '인터넷';
  if (s === '렌' || s === '렌탈') return '렌탈';
  if (s === '인렌' || s === '인/렌' || s === '인,렌' ||
      s === '렌인' || s === '렌/인' || s === '렌,인' ||
      s === '인터넷/렌탈' || s === '인터넷렌탈' ||
      s === '렌탈/인터넷' || s === '렌탈인터넷') return '인터넷/렌탈';
  return s;
}

// 이름 정규화: 앞뒤 + 내부 공백 모두 제거
function normalizeName(s) {
  return s.replace(/\s+/g, '');
}

// ──────────────────────────────────────────
// 필터링 & 집계
// ──────────────────────────────────────────
function getFilteredRows() {
  const consultant = normalizeName(document.getElementById('consultant-sel').value);
  const catFilter = document.getElementById('category-sel').value;
  let rows = allRows;
  if (consultant) rows = rows.filter(r => normalizeName(r.consultant) === consultant);
  if (catFilter === '인터넷') {
    rows = rows.filter(r => r.category === '인터넷' || r.category === '인터넷/렌탈');
  } else if (catFilter === '렌탈') {
    rows = rows.filter(r => r.category === '렌탈' || r.category === '인터넷/렌탈');
  }

  const p = currentPeriod;
  if (p === 'all') return rows;

  if (p === 'year') {
    const yr = +document.getElementById('sel-year').value;
    return rows.filter(r => r.date.getFullYear() === yr);
  }
  if (p === 'month') {
    const yr = +document.getElementById('sel-year-m').value;
    const mo = +document.getElementById('sel-month').value;
    return rows.filter(r => r.date.getFullYear() === yr && r.date.getMonth() + 1 === mo);
  }
  if (p === 'week') {
    const wval = document.getElementById('sel-week').value; // "2026-W12"
    if (!wval) return [];
    const { start, end } = weekRange(wval);
    return rows.filter(r => r.date >= start && r.date <= end);
  }
  if (p === 'day') {
    const dval = document.getElementById('sel-date').value; // "2026-03-17"
    if (!dval) return [];
    const [yr,mo,dy] = dval.split('-').map(Number);
    return rows.filter(r =>
      r.date.getFullYear()===yr && r.date.getMonth()+1===mo && r.date.getDate()===dy);
  }
  if (p === 'range') {
    const fromVal = document.getElementById('sel-range-from').value;
    const toVal = document.getElementById('sel-range-to').value;
    if (!fromVal || !toVal) return [];
    const start = new Date(fromVal + 'T00:00:00');
    const end = new Date(toVal + 'T23:59:59');
    if (start > end) return [];
    return rows.filter(r => r.date >= start && r.date <= end);
  }
  return rows;
}

function weekRange(wval) {
  // wval = "YYYY-Www"
  const [yearStr, weekStr] = wval.split('-W');
  const year = +yearStr, week = +weekStr;
  // ISO week: week 1 = first Thursday
  const jan4 = new Date(year, 0, 4);
  const dayOfWeek = (jan4.getDay() + 6) % 7; // Mon=0
  const weekStart = new Date(jan4);
  weekStart.setDate(jan4.getDate() - dayOfWeek + (week - 1) * 7);
  weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  weekEnd.setHours(23,59,59,999);
  return { start: weekStart, end: weekEnd };
}

// 중복제거: 번호 기준, accepted는 OR
function deduplicate(rows) {
  const map = new Map();
  for (const r of rows) {
    if (!map.has(r.phone)) {
      map.set(r.phone, { ...r });
    } else if (r.accepted) {
      map.get(r.phone).accepted = true;
    }
  }
  return [...map.values()];
}

function calcStats(rows) {
  const deduped = deduplicate(rows);
  const total = deduped.length;
  const accepted = deduped.filter(r => r.accepted).length;
  const rate = total > 0 ? (accepted / total * 100).toFixed(1) : '0.0';
  return { total, accepted, rate };
}

// 그룹별 집계
function groupRows(rows, groupBy) {
  const map = new Map();

  function key(date) {
    if (groupBy === 'month') {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
    }
    if (groupBy === 'day') {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }
    return String(date.getFullYear());
  }

  for (const r of rows) {
    const k = key(r.date);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(r);
  }

  const sorted = [...map.entries()].sort((a,b) => a[0].localeCompare(b[0]));
  return sorted.map(([k, grpRows]) => {
    const s = calcStats(grpRows);
    return { label: formatLabel(k, groupBy), key: k, ...s };
  });
}

function formatLabel(k, groupBy) {
  if (groupBy === 'month') {
    const [y,m] = k.split('-');
    return `${y}년 ${+m}월`;
  }
  if (groupBy === 'day') {
    const [y,m,d] = k.split('-');
    return `${+m}/${+d}`;
  }
  return k + '년';
}

// ──────────────────────────────────────────
// UI 렌더링
// ──────────────────────────────────────────
function render() {
  const filtered = getFilteredRows();
  const stats = calcStats(filtered);

  document.getElementById('val-total').textContent = stats.total.toLocaleString();
  document.getElementById('val-accepted').textContent = stats.accepted.toLocaleString();
  document.getElementById('val-rate').textContent = stats.rate + '%';

  const groupBy = getGroupBy();
  const groups = groupRows(filtered, groupBy);

  renderChart(groups, groupBy);
  renderTable(groups);
}

function getGroupBy() {
  if (currentPeriod === 'all' || currentPeriod === 'year') return 'month';
  if (currentPeriod === 'range') {
    // 범위가 60일 초과면 월별, 이하면 일별
    const fromVal = document.getElementById('sel-range-from')?.value;
    const toVal = document.getElementById('sel-range-to')?.value;
    if (fromVal && toVal) {
      const diff = (new Date(toVal) - new Date(fromVal)) / 86400000;
      return diff > 60 ? 'month' : 'day';
    }
    return 'day';
  }
  if (currentPeriod === 'month' || currentPeriod === 'week') return 'day';
  return 'day';
}

function renderChart(groups, groupBy) {
  const labels = groups.map(g => g.label);
  const totalData = groups.map(g => g.total);
  const rateData = groups.map(g => parseFloat(g.rate));

  const ctx = document.getElementById('mainChart').getContext('2d');

  if (mainChart) mainChart.destroy();

  if (groups.length === 0) {
    document.getElementById('chart-title').textContent = '기간별 통계 (데이터 없음)';
    return;
  }

  document.getElementById('chart-title').textContent =
    groupBy === 'month' ? '월별 통계' : groupBy === 'day' ? '일별 통계' : '연도별 통계';

  mainChart = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: '총 콜수',
          data: totalData,
          backgroundColor: 'rgba(26,115,232,0.75)',
          yAxisID: 'y',
          order: 2,
        },
        {
          type: 'line',
          label: '접수율 (%)',
          data: rateData,
          borderColor: '#db4437',
          backgroundColor: 'rgba(219,68,55,0.1)',
          borderWidth: 2.5,
          pointRadius: 4,
          tension: 0.3,
          yAxisID: 'y2',
          order: 1,
          fill: false,
        }
      ]
    },
    options: {
      responsive: true,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { position: 'top' },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label === '접수율 (%)') return ` 접수율: ${ctx.parsed.y}%`;
              return ` ${ctx.dataset.label}: ${ctx.parsed.y}건`;
            }
          }
        }
      },
      scales: {
        y: {
          type: 'linear',
          position: 'left',
          beginAtZero: true,
          title: { display: true, text: '건수' },
          ticks: { stepSize: 1 }
        },
        y2: {
          type: 'linear',
          position: 'right',
          min: 0,
          max: 100,
          title: { display: true, text: '접수율 (%)' },
          grid: { drawOnChartArea: false },
          ticks: { callback: v => v + '%' }
        }
      }
    }
  });
}

function renderTable(groups) {
  const el = document.getElementById('detail-table');
  if (groups.length === 0) {
    el.innerHTML = '<div class="no-data">해당 기간에 데이터가 없습니다.</div>';
    return;
  }

  let html = `<table>
    <thead><tr>
      <th>기간</th>
      <th>총 콜수</th>
      <th>접수</th>
      <th>접수율</th>
    </tr></thead><tbody>`;

  for (const g of groups) {
    const rate = parseFloat(g.rate);
    const rateClass = rate >= 60 ? 'rate-high' : rate >= 30 ? 'rate-mid' : 'rate-low';
    html += `<tr>
      <td>${g.label}</td>
      <td>${g.total}</td>
      <td>${g.accepted}</td>
      <td class="rate-cell ${rateClass}">${g.rate}%</td>
    </tr>`;
  }

  // 합계 행
  const totals = groups.reduce((acc, g) => {
    acc.total += g.total;
    acc.accepted += g.accepted;
    return acc;
  }, { total:0, accepted:0 });
  const totalRate = totals.total > 0 ? (totals.accepted/totals.total*100).toFixed(1) : '0.0';
  const rateClass = parseFloat(totalRate) >= 60 ? 'rate-high' : parseFloat(totalRate) >= 30 ? 'rate-mid' : 'rate-low';

  html += `</tbody><tfoot><tr style="font-weight:700;background:#f8f9fa;">
    <td>합계</td>
    <td>${totals.total}</td>
    <td>${totals.accepted}</td>
    <td class="rate-cell ${rateClass}">${totalRate}%</td>
  </tr></tfoot></table>`;

  el.innerHTML = html;
}

// ──────────────────────────────────────────
// 상담사 초기화
// ──────────────────────────────────────────
function initConsultants() {
  const names = [...new Set(allRows.map(r => r.consultant).filter(Boolean))].sort();
  const sel = document.getElementById('consultant-sel');
  sel.innerHTML = '<option value="">전체 상담사</option>';
  names.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });
}

// ──────────────────────────────────────────
// 기간 선택 UI 빌드
// ──────────────────────────────────────────
function buildPeriodSelector(period) {
  const el = document.getElementById('period-selector');
  el.innerHTML = '';

  const years = [...new Set(allRows.map(r => r.date.getFullYear()))].sort((a,b)=>b-a);
  if (years.length === 0) years.push(new Date().getFullYear());

  if (period === 'year') {
    const sel = makeSelect('sel-year', years.map(y => [y, y+'년']), years[0]);
    el.appendChild(sel);
  }
  else if (period === 'month') {
    const ySel = makeSelect('sel-year-m', years.map(y => [y, y+'년']), years[0]);
    const months = Array.from({length:12}, (_,i) => [i+1, (i+1)+'월']);
    const mSel = makeSelect('sel-month', months, new Date().getMonth()+1);
    el.appendChild(ySel); el.appendChild(mSel);
  }
  else if (period === 'week') {
    const inp = document.createElement('input');
    inp.type = 'week'; inp.id = 'sel-week';
    const today = new Date();
    inp.value = toWeekValue(today);

    const rangeLabel = document.createElement('span');
    rangeLabel.id = 'week-range-label';
    rangeLabel.style.cssText = 'font-size:14px;color:#555;padding:0 4px;';

    function updateWeekLabel(wval) {
      if (!wval) { rangeLabel.textContent = ''; return; }
      const { start, end } = weekRange(wval);
      rangeLabel.textContent = `(${toDateLabel(start)} ~ ${toDateLabel(end)})`;
    }

    inp.addEventListener('change', () => { updateWeekLabel(inp.value); updateMemoDot(); render(); });
    updateWeekLabel(inp.value);

    el.appendChild(inp);
    el.appendChild(rangeLabel);
  }
  else if (period === 'day') {
    const inp = document.createElement('input');
    inp.type = 'date'; inp.id = 'sel-date';
    inp.value = toDateValue(new Date());
    inp.addEventListener('change', render);
    el.appendChild(inp);
  }
  else if (period === 'range') {
    const fromInp = document.createElement('input');
    fromInp.type = 'date'; fromInp.id = 'sel-range-from';
    fromInp.value = toDateValue(new Date(new Date().setDate(1))); // 이번달 1일
    fromInp.addEventListener('change', render);

    const sep = document.createElement('span');
    sep.textContent = '~';
    sep.style.cssText = 'padding:0 4px;line-height:32px;color:#555;';

    const toInp = document.createElement('input');
    toInp.type = 'date'; toInp.id = 'sel-range-to';
    toInp.value = toDateValue(new Date());
    toInp.addEventListener('change', render);

    el.appendChild(fromInp); el.appendChild(sep); el.appendChild(toInp);
  }
}

function makeSelect(id, options, defaultVal) {
  const sel = document.createElement('select');
  sel.id = id;
  for (const [val, label] of options) {
    const o = document.createElement('option');
    o.value = val; o.textContent = label;
    if (val == defaultVal) o.selected = true;
    sel.appendChild(o);
  }
  sel.addEventListener('change', render);
  return sel;
}

function toWeekValue(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  const weekNum = 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2,'0')}`;
}

function toDateValue(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function toDateLabel(date) {
  return `${date.getFullYear()}.${String(date.getMonth()+1).padStart(2,'0')}.${String(date.getDate()).padStart(2,'0')}`;
}

// ──────────────────────────────────────────
// 이벤트 바인딩
// ──────────────────────────────────────────
document.querySelectorAll('.period-tabs .tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-tabs .tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentPeriod = btn.dataset.p;
    buildPeriodSelector(currentPeriod);
    syncMemoButton();
    render();
  });
});

document.getElementById('category-sel').addEventListener('change', render);
document.getElementById('consultant-sel').addEventListener('change', render);

// ──────────────────────────────────────────
// 주간 메모 (localStorage)
// ──────────────────────────────────────────
const MEMO_KEY_PREFIX = 'phone_stat_memo_';

function getMemoKey(wval, cat) {
  return MEMO_KEY_PREFIX + wval + '_' + cat;
}

function loadMemo(wval, cat) {
  return localStorage.getItem(getMemoKey(wval, cat)) || '';
}

function saveMemo(wval, cat, text) {
  if (text.trim()) {
    localStorage.setItem(getMemoKey(wval, cat), text);
  } else {
    localStorage.removeItem(getMemoKey(wval, cat));
  }
}

function hasMemo(wval) {
  return !!(loadMemo(wval, '인터넷') || loadMemo(wval, '렌탈'));
}

function updateMemoDot() {
  const wval = document.getElementById('sel-week')?.value;
  const dot = document.querySelector('#btn-memo .memo-dot');
  if (!dot) return;
  dot.style.display = (wval && hasMemo(wval)) ? 'block' : 'none';
}

// 메모 버튼 표시/숨김
function syncMemoButton() {
  const btn = document.getElementById('btn-memo');
  btn.style.display = (currentPeriod === 'week') ? 'inline-flex' : 'none';
  if (currentPeriod === 'week') updateMemoDot();
}

// 메모 탭 전환
document.querySelectorAll('.memo-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.memo-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.memo-pane').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('memo-pane-' + btn.dataset.cat).classList.add('active');
  });
});

// 메모 열기
document.getElementById('btn-memo').addEventListener('click', () => {
  const wval = document.getElementById('sel-week')?.value;
  if (!wval) return;
  const { start, end } = weekRange(wval);
  document.getElementById('memo-modal-title').textContent =
    `📝 주간 메모 — ${toDateLabel(start)} ~ ${toDateLabel(end)}`;
  document.getElementById('memo-text-인터넷').value = loadMemo(wval, '인터넷');
  document.getElementById('memo-text-렌탈').value = loadMemo(wval, '렌탈');
  document.getElementById('memo-overlay').classList.add('show');
});

// 저장
document.getElementById('btn-memo-save').addEventListener('click', () => {
  const wval = document.getElementById('sel-week')?.value;
  if (!wval) return;
  saveMemo(wval, '인터넷', document.getElementById('memo-text-인터넷').value);
  saveMemo(wval, '렌탈', document.getElementById('memo-text-렌탈').value);
  updateMemoDot();
  document.getElementById('memo-overlay').classList.remove('show');
});

// 닫기
document.getElementById('btn-memo-cancel').addEventListener('click', () => {
  document.getElementById('memo-overlay').classList.remove('show');
});

// 오버레이 바깥 클릭 시 닫기
document.getElementById('memo-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('memo-overlay')) {
    document.getElementById('memo-overlay').classList.remove('show');
  }
});

// 초기 로드
loadData();

// ──────────────────────────────────────────
// 엑셀 내보내기 (ExcelJS — 테이블 + 차트 이미지)
// ──────────────────────────────────────────
async function exportExcel() {
  const btn = document.getElementById('btn-export');
  const filtered = getFilteredRows();
  const groupBy = getGroupBy();
  const groups = groupRows(filtered, groupBy);

  if (groups.length === 0) {
    alert('내보낼 데이터가 없습니다.');
    return;
  }

  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('전화통계');

    // ── 제목 행 ──
    const titleLabel = document.getElementById('chart-title').textContent || '전화통계';
    const consultantSel = document.getElementById('consultant-sel');
    const categorySel = document.getElementById('category-sel');
    const consultantText = consultantSel.options[consultantSel.selectedIndex].text;
    const categoryText = categorySel.options[categorySel.selectedIndex].text;
    const subtitle = [consultantText, categoryText].filter(t => !t.startsWith('전체')).join(' / ') || '전체';

    ws.mergeCells('A1:D1');
    const titleCell = ws.getCell('A1');
    titleCell.value = `${titleLabel} [${subtitle}]`;
    titleCell.font = { bold: true, size: 14 };
    titleCell.alignment = { horizontal: 'center', vertical: 'middle' };
    ws.getRow(1).height = 28;

    ws.addRow([]); // 빈 행

    // ── 헤더 ──
    const headerRow = ws.addRow(['기간', '총 콜수', '접수', '접수율']);
    headerRow.font = { bold: true };
    headerRow.eachCell(cell => {
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1A73E8' } };
      cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
      cell.alignment = { horizontal: 'center', vertical: 'middle' };
      cell.border = {
        bottom: { style: 'thin', color: { argb: 'FFCCCCCC' } }
      };
    });
    ws.getRow(headerRow.number).height = 22;

    // ── 데이터 행 ──
    for (const g of groups) {
      const rate = parseFloat(g.rate);
      const row = ws.addRow([g.label, g.total, g.accepted, g.rate + '%']);
      row.getCell(1).alignment = { horizontal: 'center' };
      row.getCell(2).alignment = { horizontal: 'center' };
      row.getCell(3).alignment = { horizontal: 'center' };
      const rateCell = row.getCell(4);
      rateCell.alignment = { horizontal: 'center' };
      rateCell.font = {
        bold: true,
        color: { argb: rate >= 60 ? 'FF0F9D58' : rate >= 30 ? 'FFF4B400' : 'FFDB4437' }
      };
      row.eachCell(cell => {
        cell.border = { bottom: { style: 'thin', color: { argb: 'FFF0F0F0' } } };
      });
    }

    // ── 합계 행 ──
    const totals = groups.reduce((acc, g) => {
      acc.total += g.total;
      acc.accepted += g.accepted;
      return acc;
    }, { total: 0, accepted: 0 });
    const totalRate = totals.total > 0 ? (totals.accepted / totals.total * 100).toFixed(1) : '0.0';
    const sumRow = ws.addRow(['합계', totals.total, totals.accepted, totalRate + '%']);
    sumRow.font = { bold: true };
    sumRow.eachCell(cell => {
      cell.alignment = { horizontal: 'center' };
      cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFF8F9FA' } };
      cell.border = { top: { style: 'medium', color: { argb: 'FFE8E8E8' } } };
    });

    // ── 열 너비 ──
    ws.getColumn(1).width = 18;
    ws.getColumn(2).width = 12;
    ws.getColumn(3).width = 12;
    ws.getColumn(4).width = 12;

    // ── 차트 이미지 삽입 ──
    if (mainChart) {
      const chartBase64 = mainChart.toBase64Image('image/png', 1.0);
      const base64Data = chartBase64.replace(/^data:image\/png;base64,/, '');

      const imageId = wb.addImage({ base64: base64Data, extension: 'png' });

      // 테이블 끝 행 다음에 여백 두고 이미지 삽입
      const imgStartRow = sumRow.number + 2;
      ws.addImage(imageId, {
        tl: { col: 0, row: imgStartRow - 1 },
        ext: { width: 640, height: 320 }
      });

      // 이미지가 들어갈 행 높이 확보
      for (let i = imgStartRow; i < imgStartRow + 18; i++) {
        ws.getRow(i).height = 18;
      }
    }

    // ── 다운로드 ──
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {
      type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
    });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const now = new Date();
    const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    a.href = url;
    a.download = `전화통계_${dateStr}.xlsx`;
    a.click();
    URL.revokeObjectURL(url);

  } catch(e) {
    alert('엑셀 저장 중 오류가 발생했습니다.\n' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '⬇ 엑셀 저장';
}
